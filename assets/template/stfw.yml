stfw:
  project_version: 0.1.0

  # ログレベル trace | debug | info | warn | error
  loglevel: "info"

  # タイムゾーン (業務日付判定・レポートの時刻表記に使用)
  timezone: "Asia/Tokyo"

  # インベントリファイル
  inventory: staging.yml

  # OpenTelemetry (実行状況の OTLP トレースエクスポート)
  # 送信先は OTel 標準環境変数 OTEL_EXPORTER_OTLP_ENDPOINT でも指定できます (環境変数が優先)。
  # endpoint と環境変数のどちらも未設定の場合は送信されません。
  otel:
    # OTLP/HTTP エンドポイントのベース URL (パス省略時は /v1/traces に送信)
#    endpoint: http://localhost:4318

  # sample
  sample:
    key: value
    map:
      key1: map_value1
      key2: map_value2
    list:
      - list_value1
      - list_value2
