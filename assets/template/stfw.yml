stfw:
  project_version: 0.1.0

  # ログレベル trace | debug | info | warn | error
  loglevel: "info"

  # タイムゾーン (業務日付判定・レポートの時刻表記に使用)
  timezone: "Asia/Tokyo"

  # インベントリファイル
  inventory: staging.yml

  # webhook
  webhooks:
    urls:
      # 任意のURLを指定できます。
      - http://your.domain/endpoint
      # 環境変数でも指定できます。
      - ${URL_WEBHOOK}
      # webhookの動作を確認したい場合、https://webhook.site で発行したURLを指定してください。
#      - https://webhook.site/00000000-0000-0000-0000-000000000000
    on_start: true
    on_success: true
    on_error: true

  # sample
  sample:
    key: value
    map:
      key1: map_value1
      key2: map_value2
    list:
      - list_value1
      - list_value2
