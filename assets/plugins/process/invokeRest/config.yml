# invokeRest のデフォルト設定。
#
# k6_version : 取得する k6 のリリースタグ
# script     : k6 テストスクリプトのパス (プロセスディレクトリ基準)
# host_group : (任意) inventory グループ名。先頭ホストを __ENV.stfw_target_host へ注入
# user       : (任意) secret {host}-{user} のパスワードを __ENV.stfw_target_password へ注入
# env        : (任意) k6 へ渡す "KEY=VALUE" のリスト (-e で注入)
#
#   stfw:
#     process:
#       invokeRest:
#         script: script.js
#         host_group: api
#         user: appuser
#         env:
#           - "VUS=5"
#           - "DURATION=10s"
#
# invokeRest は API への取引入力とレスポンス検証 (Act) を grafana k6 で実行する。
# 接続情報は inventory/secret から解決し config に直書きしない。
stfw:
  process:
    invokeRest:
      k6_version: v2.1.0
      script: script.js
