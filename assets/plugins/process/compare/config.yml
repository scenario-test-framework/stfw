# compare のデフォルト設定。
#
# compare_files_version : 取得する compare-files のリリースタグ
#
# compare は期待値 (expect/) と収集エビデンス (actual/) を compare-files で突合する
# Assert フェーズのプラグイン。接続情報は不要 (ローカルのファイル比較)。
#
# ディレクトリ規約 (エビデンスディレクトリ規約・第3の互換境界):
#   expect/  : git 管理。直下に「同一 bizdate 内の収集系 process ディレクトリ名」を置き、
#              その配下は当該 process の evidence/ 配下と同型にする。
#   actual/  : gitignore・自動生成。expect と同じ構造で、実体は各収集系 process の
#              evidence/ 配下の各ファイルへの symlink。
#   result/  : gitignore。compare-files の比較結果 (CompareSummary.csv 等) の出力先。
#
# 比較レイアウト (compare_layout/) は「同梱デフォルト → プロジェクト共通
# ({proj}/config/plugins/process/compare/) → プロセスローカル (config/)」の後勝ちマージで解決される。
# 起動設定 (compare_files.json) は前勝ち解決のため、プロジェクト共通側には置かない (AS-BUILT §4.11)。
stfw:
  process:
    compare:
      compare_files_version: v2.2.0
