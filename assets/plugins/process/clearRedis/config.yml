# clearRedis の既定設定。プロジェクト側 config で上書きする。
#
# host_group   : 接続先 Redis ホストを解決する inventory グループ名 (末尾 group で許可)
# port         : Redis ポート
# db           : DB 番号 (0-15)
# user         : ACL ユーザー (空なら AUTH をパスワードのみで行う)
# key_patterns : match のみ使用。SCAN の glob パターンに一致するキーを削除する
#
# 接続情報 (ホスト・パスワード) を config に直書きしてはならない (禁止契約)。
stfw:
  process:
    clearRedis:
      host_group: ""
      port: "6379"
      db: "0"
      user: ""
      key_patterns: []
