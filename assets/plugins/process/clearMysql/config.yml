# clearMysql の既定設定。プロジェクト側 config で上書きする。
#
# host_group : 接続先 DB ホストを解決する inventory グループ名 (末尾 group で許可)
# port       : MySQL ポート
# database   : 対象データベース名
# user       : 接続ユーザー (パスワードは secret {host}-{user} で解決)
# tables     : 削除対象テーブル名のリスト (FK の子 → 親順)
#
# 接続情報 (ホスト・パスワード) を config に直書きしてはならない (禁止契約)。
stfw:
  process:
    clearMysql:
      host_group: ""
      port: "3306"
      database: ""
      user: ""
      tables: []
