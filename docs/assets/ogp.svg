<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'Helvetica Neue', Helvetica, Arial, 'DejaVu Sans', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f81f7"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="8" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="96" y="212" font-size="150" font-weight="800" fill="#f0f6fc" letter-spacing="2">stfw</text>
  <text x="102" y="270" font-size="40" font-weight="600" fill="#7d8590" letter-spacing="6">SCENARIO TEST FRAMEWORK</text>

  <!-- tagline -->
  <text x="98" y="342" font-size="33" fill="#c9d1d9">Cross-business-date scenario testing,</text>
  <text x="98" y="386" font-size="33" fill="#c9d1d9">described by directory convention, run from a single Go binary.</text>

  <!-- AACA pipeline -->
  <g transform="translate(98,452)">
    <g font-size="28" font-weight="700" text-anchor="middle">
      <rect x="0"   y="0" width="228" height="72" rx="14" fill="#161b22" stroke="#2f81f7" stroke-width="2"/>
      <text x="114" y="46" fill="#79c0ff">Arrange</text>

      <rect x="264" y="0" width="228" height="72" rx="14" fill="#161b22" stroke="#388bfd" stroke-width="2"/>
      <text x="378" y="46" fill="#a5d6ff">Act</text>

      <rect x="528" y="0" width="228" height="72" rx="14" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
      <text x="642" y="46" fill="#7ee787">Collect</text>

      <rect x="792" y="0" width="228" height="72" rx="14" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
      <text x="906" y="46" fill="#7ee787">Assert</text>
    </g>
    <g fill="#7d8590" font-size="34" font-weight="700" text-anchor="middle">
      <text x="246" y="48">&#8594;</text>
      <text x="510" y="48">&#8594;</text>
      <text x="774" y="48">&#8594;</text>
    </g>
  </g>

  <!-- footer -->
  <text x="98" y="596" font-size="26" fill="#7d8590" font-family="'SF Mono','DejaVu Sans Mono',monospace">github.com/scenario-test-framework/stfw</text>

  <!-- terminal accent (right) -->
  <g transform="translate(858,120)">
    <rect x="0" y="0" width="326" height="196" rx="16" fill="#010409" stroke="#30363d" stroke-width="2"/>
    <circle cx="26" cy="26" r="7" fill="#f85149"/>
    <circle cx="50" cy="26" r="7" fill="#d29922"/>
    <circle cx="74" cy="26" r="7" fill="#3fb950"/>
    <g font-family="'SF Mono','DejaVu Sans Mono',monospace" font-size="23">
      <text x="24" y="86" fill="#7ee787">$ stfw run sample</text>
      <text x="24" y="122" fill="#c9d1d9">Success  1500 / 2300</text>
      <text x="24" y="158" fill="#c9d1d9">Success  1300 / 2400</text>
    </g>
  </g>
</svg>
