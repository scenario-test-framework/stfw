system_architecture:
  tiers:
    - id: "tier-cli"
      name: "CLI 本体（stfw コマンド）"
      description: "Go 単一バイナリの CLI。presentation〜gateway の 5 層と実行エンジン（内蔵ランナー）を内包し、init / new / validate / run / status / report / inventory / secret / ssh / plugin の各コマンドを提供する"
      policies: []
      technology_candidates:
        - "CLI（単一バイナリ配布・ランタイム依存なし）"
        - "内蔵実行エンジン（木構造の逐次実行 + parallel 子プロセス並走）"
        - "構造化ログ（stderr 出力）"
      rules:
        - id: "SR-002"
          name: "実行ログ運用"
          description: "実行ログは stderr への構造化ログ（シークレットマスキング済み）として出力する（stdout はコマンド出力専用）。ファイルログ（.stfw/stfw.log への集約・日次ローテーション・terminal 実行時のカラー出力）は要求撤回により持たない。ログレベル（trace〜error、デフォルト info）は stfw.yml またはコマンドオプションで変更できる。ログの保管は呼び出し元（terminal / CI のログ保持）に委ね、実行結果の保管期間（1 ヶ月）は実行ジャーナル・HTML レポートのハウスキープ（stfw.housekeep.retention）で担保する"
          reason: "NFR C.6.1.1 ログ保管期間(Lv1) / C.6.1.2 ログ種別への対応。ユーザー指定: ファイルログ要求（DIST-002）はプロダクトオーナー決定で撤回され、stderr 構造化ログと HTML レポート・OTLP トレースの可視化で運用要求を満たす"
          source_model: "情報: 実行ログ, バリエーション: ログレベル, NFR C.6.1.1, NFR C.6.1.2"
          confidence: "user"
        - id: "SR-007"
          name: "parallel 子プロセスの並走実行"
          description: "組込み parallel プロセスタイプは、プロセスディレクトリ配下に定義した子プロセス（親と同形式 _{seq}_{group}_{type}。入れ子禁止・子 0 件は定義不正）を並走させる。子プロセス 1 件 = 実行ジャーナル上の 1 ステップとし、process 階層フック（setup / teardown）は親で 1 回のみ実行する。子同士に Blocked は無く（並走に順序依存が無いため先行子が Error でも全子を最後まで実行）、親のステータスは全子の悪い方（Error > Warn > Success）で集約する。同時実行数は max_parallel（0 = 上限なし、正整数 = 上限（超過分は seq 順に待機）、負数・非整数は設定不正として親 Error）を設定チェーン（同梱デフォルト stfw.yml → プロジェクト stfw.yml → プロジェクト config/plugins/process/parallel/config.yml → プロセス config/config.yml、後勝ち）で解決する。部分実行（--from / --only）で指定できるのは親 parallel プロセスまで。互換境界（ディレクトリ規約・プラグイン実行契約・エビデンスディレクトリ規約・ジャーナル）は不変"
          reason: "条件「parallel 子プロセスの並走実行」に順序依存の無い処理の実行時間短縮の要求があるため（v1.5.0 で実装・リリース済み機能の反映。実装契約の正本は AS-BUILT §4.14）"
          source_model: "条件: parallel 子プロセスの並走実行, バリエーション: parallel 同時実行数設定, プロセスタイプ, 状態モデル「ステップ実行ステータス」, BUC: シナリオ一括自動実行フロー"
          confidence: "user"
  cross_tier_policies:
    - id: "CTP-007"
      name: "性能・拡張性は単一利用者・逐次実行前提"
      description: "同時アクセス・スループットのスケールアウトはスコープ外とする（利用者ローカルで 1 実行 = 1 プロセス）。業務日付をまたぐ長時間バッチ実行は増分レポートと OTel トレースで進捗確認する。性能テストは実施しない。組込み parallel プロセスタイプによる子プロセス並走は単一実行内の実行時間短縮であり、複数利用者の同時アクセスやスループットのスケールアウトとは区別する（NFR B.x のグレードは引き上げない）。実行ホストの性能向上はスケールアップで対応する"
      reason: "NFR B.1.1.1 同時アクセス(Lv1) / B.1.1.3 / B.1.2.1 / B.2.1.2 スループット(Lv1) / B.2.2.1 バッチ処理時間(Lv1・ユーザー確定) / B.3.1.1 CPU 拡張性(Lv1) / B.4.1.1 性能テスト(Lv0) への対応。ユーザー指定: parallel は単一実行内の子プロセス並走でありスケールアウト要求（NFR B.x）の対象外とする位置づけを変更要望で確定"
      source_model: "条件: parallel 子プロセスの並走実行, NFR B.1.1.1, NFR B.1.1.3, NFR B.1.2.1, NFR B.2.1.2, NFR B.2.2.1, NFR B.3.1.1, NFR B.4.1.1"
      confidence: "user"
  cross_tier_rules:
    - id: "CTR-003"
      name: "構造化ログの stderr 出力"
      description: "CLI 本体のログは stderr への構造化ログとして出力する（stdout はコマンド出力専用）。単一ファイル（.stfw/stfw.log）への集約は要求撤回により行わない。OTLP 送信失敗等の警告も本ログに記録する"
      reason: "NFR C.6.1.2 ログ種別への対応。ユーザー指定: ファイルログ要求の撤回（障害調査は stderr 構造化ログ + HTML レポート / OTLP トレースで行う）"
      source_model: "情報: 実行ログ, NFR C.6.1.2"
      confidence: "user"
