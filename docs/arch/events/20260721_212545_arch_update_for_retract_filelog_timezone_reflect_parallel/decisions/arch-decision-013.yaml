schema_version: "1.0"
artifact_type: "decision_record"
skill_type: "architecture"
artifact_id: "arch-decision-013"
title: "組込み parallel プロセスタイプの反映（単一実行内の子プロセス並走）"
status: "approved"
generated_at: "2026-07-21T21:25:45"
context: |
  arch-design には「v1.0 は逐次実行のみ（将来 --parallel の余地をランナー分離で残す）」という
  技術的制約と、CTP-007 の「将来の並列実行はランナーのシナリオ単位分離で余地を残す」という
  記述があった。一方、v1.5.0 で組込み parallel プロセスタイプ（プロセスディレクトリ配下の
  子プロセス並走。実装契約は AS-BUILT §4.14）が実装・リリース済みであり、要求・要件
  （RDRA 条件「parallel 子プロセスの並走実行」・バリエーション「parallel 同時実行数設定」）にも
  反映されたため、arch の制約記述と実態が矛盾していた。
decision: |
  実行モデルは逐次実行（1 実行 = 1 プロセス）を維持し、例外として組込み parallel
  プロセスタイプによる子プロセスの並走を tier-cli のルール SR-007 として明文化する。
  - 子プロセスは親と同形式 _{seq}_{group}_{type}（入れ子禁止・子 0 件は定義不正）
  - 子 1 件 = 実行ジャーナル上の 1 ステップ。process 階層フックは親で 1 回のみ
  - 子同士に Blocked は無い。親のステータスは全子の悪い方（Error > Warn > Success）で集約
  - max_parallel（0 = 上限なし）を設定チェーン（同梱デフォルト → プロジェクト stfw.yml →
    プロジェクト plugin config → プロセス config、後勝ち）で解決
  - 互換境界（ディレクトリ規約・プラグイン実行契約・エビデンス規約・ジャーナル）は不変
  将来余地として記述していた「ランナーのシナリオ単位分離（--parallel）」とは別の実現形態で
  あり、シナリオ単位・run 単位の並列実行は引き続き提供しない。スケールアウト（NFR B.x）は
  スコープ外のままとし、NFR グレードは引き上げない。
consequences:
  positive:
    - "順序依存の無い処理（複数ホストへの収集・複数データストアの準備等）の実行時間を短縮できる"
    - "ジャーナルスキーマ・状態遷移・互換境界を一切変更せずに並走を表現できる（子 1 件 = 1 ステップ）"
  negative:
    - "子の stdout / stderr は行単位で交錯し得る（行内は保証）"
    - "step_end の記録順は完了時刻順を保証しない（実時刻は start_ts / end_ts が保持）"
    - "並列実行の範囲は parallel プロセス配下の子に限る（シナリオ単位の並列は非対応のまま）"
alternatives_considered:
  - name: "ランナーのシナリオ単位分離による --parallel（当初の将来余地）"
    reason_rejected: "シナリオ間の資源競合（同一テスト対象・データストア）の調停が必要になり影響が大きい。順序依存の無い処理の短縮はプロセス配下の子並走で十分"
  - name: "並列実行を要求に反映しない（記述の据え置き）"
    reason_rejected: "実装・リリース済み（v1.5.0）の機能と契約文書の矛盾が残り、仕様駆動開発の正本性を損なう"
