system_architecture:
  tiers:
    - id: "tier-cli"
      policies:
        - id: "SP-004"
          name: "実行順序保証・エラー時停止"
          description: "内蔵ランナーがスクリプトをファイル名昇順に逐次実行し、Error 発生（終了コード 0・3 以外、または compare の on_mismatch=error での比較不一致）後の後続スクリプトは実行せず Blocked として記録し停止する。終了コード 3 は Warn として記録し続行し、上位階層へは Error > Warn > Success で集約する"
          reason: "実行順序の保証とエラー時停止というビジネスポリシーを担保し、テスト結果の再現性と失敗箇所の特定を可能にするため（Warn 続行は差分確認運用のための例外で、REQ-023 で導入）"
          source_model: "条件: 逐次実行・エラー時 Blocked, 状態モデル「ステップ実行ステータス」, BUC: シナリオ一括自動実行フロー"
          confidence: "user"
  cross_tier_policies:
    - id: "CTP-005"
      name: "再実行は新 run_id の別実行"
      description: "階層実行ステータスの終了状態（Success / Warn / Error）からの再遷移は行わず、再実行は常に新しい run_id の別実行として扱う。ジャーナルは追記専用でイベントの訂正・削除を行わない"
      reason: "実行結果の不変性と監査可能性を保ち、冪等性の議論を「実行単位の分離」で単純化するため"
      source_model: "条件: run_id の採番・保持, 状態モデル「階層実行ステータス」"
      confidence: "user"
app_architecture:
  tier_layers:
    - tier_id: "tier-cli"
      layers:
        - id: "L-cli-domain"
          rules:
            - id: "LR-004"
              name: "不正な状態遷移は error 返却"
              description: "状態モデル「階層実行ステータス」（Started → Success / Warn / Error）と状態モデル「ステップ実行ステータス」（Pending → Success / Warn / Error / Blocked）は別型として実装し、不正遷移は panic せず error を返す"
              reason: "外部から編集可能なジャーナルのリプレイ経路でも安全に検証を通すため"
              source_model: "状態モデル「階層実行ステータス」, 状態モデル「ステップ実行ステータス」"
              confidence: "user"
