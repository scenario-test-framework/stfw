system_architecture:
  tiers:
    - id: "tier-cli"
      name: "CLI 本体（stfw コマンド）"
      description: "Go 単一バイナリの CLI。presentation〜gateway の 5 層と実行エンジン（内蔵ランナー）を内包し、init / new / validate / run / status / report / inventory / secret / ssh / plugin の各コマンドを提供する"
      technology_candidates:
        - "CLI（単一バイナリ配布・ランタイム依存なし）"
        - "内蔵実行エンジン（木構造の逐次実行）"
        - "構造化ログ（ローカルファイル出力）"
      policies:
        - id: "SP-001"
          name: "サーバレス・オンデマンド実行"
          description: "常駐サービス・server 管理・状態 DB を持たず、stfw run の 1 コマンドで前準備なしに実行を開始する。冗長化・サービス切替は対象外とし、可用性は配布物の再取得とプロジェクトディレクトリの保全で担保する"
          reason: "NFR A.1.1.1 運用時間(Lv1) / A.2.1.1 冗長化(Lv1) への対応。利用者の作業時間帯にのみ動くオンデマンド CLI であり常駐構成は過剰"
          source_model: "条件: run 実行の前提条件, NFR A.1.1.1, NFR A.1.2.1, NFR A.2.1.1, NFR A.2.3.1, NFR A.2.6.2"
          confidence: "user"
        - id: "SP-002"
          name: "run 前静的検証の統合"
          description: "stfw run の開始前に validate 相当の静的検証（ディレクトリ規約・プラグイン解決可否・config.yml・対象シナリオ存在・プラグインのランタイム依存の存在チェック）を自動実行し、エラー時は実行を開始しない。残存する *.dig ファイルには不要である旨を警告する"
          reason: "規約違反や依存不足による実行時失敗を事前に防ぎ、テスト実行の再現性を守るため"
          source_model: "条件: run 前静的検証, プロセス実行の前提条件, BUC: シナリオ静的検証フロー, NFR B.4.1.1"
          confidence: "user"
        - id: "SP-003"
          name: "dry-run による事前確認"
          description: "stfw run --dry-run は実タスク（execute / post_execute）をスキップし、setup → pre_execute → teardown のみ実行する。テスト対象環境に影響を与えずに実行経路と前後処理を本実行前に確認できる"
          reason: "テスト実行者が本実行前に安全に実行経路を検証できるようにするため"
          source_model: "条件: dry-run の実行範囲, バリエーション: 実行モード（run_mode）, アクター: テスト実行者"
          confidence: "user"
