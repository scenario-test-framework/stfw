app_architecture:
  tier_layers:
    - tier_id: "tier-cli"
      layers:
        - id: "L-cli-presentation"
          name: "プレゼンテーション層"
          responsibility: "Driver Side の入出力。CLI フレームワークによるコマンド・引数パース、入力バリデーション、出力フォーマット、ロガーのセットアップ（構造化ログ + マスキング Writer）"
          allowed_dependencies:
            - "L-cli-usecase"
          policies:
            - id: "LP-001"
              name: "コマンド境界での入力バリデーション"
              description: "scaffold 生成・実行コマンドの引数は境界で検証する。業務日付は YYYYMMDD の 8 桁数字、連番は数値のみ、グループ名は「_」を含まないこと。検証の関所自体はドメイン層の値オブジェクトに置き、presentation はエラーメッセージへの変換を担う"
              reason: "規約違反のディレクトリ生成を防ぎ、ディレクトリ名パースの安全性を守るため"
              source_model: "条件: 業務日付フォーマット, 連番フォーマット, グループ名制約"
              confidence: "user"
          rules:
            - id: "LR-001"
              name: "終了コード変換"
              description: "ドメイン・ユースケースのエラーはプレゼンテーション層で終了コード体系（0 / 3 / 6）に変換して返却する"
              reason: "呼び出し元（CI・スクリプト）が機械的に成否判定できるようにするため"
              source_model: "バリエーション: 終了コード"
              confidence: "user"
            - id: "LR-002"
              name: "マスキング Writer の必須経由"
              description: "全ログ出力はシークレットマスキング（PASSWORD / TOKEN → [secret]）を行う Writer を経由する"
              reason: "ログ経由の資格情報漏えいをレイヤー横断で防ぐため"
              source_model: "条件: シークレットマスキング"
              confidence: "user"
        - id: "L-cli-usecase"
          name: "ユースケース層"
          responsibility: "ビジネスフロー制御。initialize / scaffold / validate / runscenario / status / report / inventory / secret / sshtrust / plugin の各ユースケース。runscenario が実行オーケストレーション（ツリー走査 → スクリプト実行 → ジャーナル追記 → 投影）を担う"
          allowed_dependencies:
            - "L-cli-domain"
            - "L-cli-repository"
          policies:
            - id: "LP-002"
              name: "実行オーケストレーション"
              description: "runscenario はシナリオツリーの昇順走査・プロセス 5 フェーズ（setup → pre_execute → execute → post_execute → teardown）の制御・ジャーナル追記・OTel / レポート投影の呼び出しを編成する。dry-run は実タスクをスキップする"
              reason: "一括自動実行のフロー制御をユースケース層に集約し、ドメインロジック（状態遷移・Blocked 伝播）と分離するため"
              source_model: "BUC: シナリオ一括自動実行フロー, 条件: dry-run の実行範囲"
              confidence: "user"
            - id: "LP-003"
              name: "エラー集約とログ一回出力"
              description: "ドメイン・下位層のエラーはユースケース層で集約キャッチし、1 回だけログ出力して上位へ返す（多重ログ防止・cause chain 保持）"
              reason: "同一エラーの多重ログを防ぎ、失敗調査のノイズを減らすため"
              source_model: "なし"
              confidence: "default"
          rules: []
        - id: "L-cli-domain"
          name: "ドメイン層"
          responsibility: "依存ゼロの純粋ロジック。BC ごとのパッケージ分割（scenario / run / notify / project）。値オブジェクト・状態遷移・ファーストクラスコレクション・ジャーナルイベント定義"
          allowed_dependencies: []
          policies:
            - id: "LP-004"
              name: "Core BC への戦術パターン集中"
              description: "Core の 2 BC（scenario / run）のみ戦術パターン（値オブジェクトの関所一本化・振る舞いを持つ区分型・ファーストクラスコレクション・集約）を適用し、Supporting（notify / project）はトランザクションスクリプトを許容する"
              reason: "投資配分をサブドメイン分類に従わせ、モデリングコストを競争優位の源泉に集中するため"
              source_model: "情報: シナリオ, 実行（run）, BUC: シナリオ一括自動実行フロー"
              confidence: "user"
            - id: "LP-005"
              name: "ドメイン層のログ出力禁止"
              description: "ドメイン層は直接ログ出力を行わない。状態変化はイベントの発行または error の返却で通知する"
              reason: "純粋ロジックの再利用性・テスト容易性を保つため"
              source_model: "なし"
              confidence: "default"
          rules:
            - id: "LR-003"
              name: "依存ゼロ"
              description: "ドメイン層は他レイヤー・外部ライブラリに依存しない（標準ライブラリのみ）"
              reason: "最内層の安定性を最大化するため"
              source_model: "なし"
              confidence: "user"
            - id: "LR-004"
              name: "不正な状態遷移は error 返却"
              description: "状態モデル「階層実行ステータス」（Started → Success / Warn / Error）と状態モデル「ステップ実行ステータス」（Pending → Success / Warn / Error / Blocked）は別型として実装し、不正遷移は panic せず error を返す"
              reason: "外部から編集可能なジャーナルのリプレイ経路でも安全に検証を通すため"
              source_model: "状態モデル「階層実行ステータス」, 状態モデル「ステップ実行ステータス」"
              confidence: "user"
        - id: "L-cli-repository"
          name: "リポジトリ層"
          responsibility: "aggregate root 単位のファイルアクセス抽象（journal / scenariotree / config / secret / inventory / plugin / scaffold / report）。ドメインモデルとファイル表現の相互変換を隠蔽する"
          allowed_dependencies:
            - "L-cli-domain"
            - "L-cli-gateway"
          policies: []
          rules:
            - id: "LR-005"
              name: "Aggregate Root 対応"
              description: "repository はドメインの aggregate root（またはファーストクラスコレクション）と 1:1 で定義する"
              reason: "データアクセスの責務単位を集約境界に一致させるため"
              source_model: "なし"
              confidence: "default"
            - id: "LR-006"
              name: "シナリオツリーの規約解釈"
              description: "scenariotree repository はシナリオ・業務日付・プロセスの各ディレクトリを scenario ルートからの深さと stfw.yml の存在で階層判定し、「_」始まりディレクトリのみを名前昇順で実行対象として列挙する"
              reason: "ディレクトリ構造 = 実行定義の機械的解釈を一箇所に閉じるため"
              source_model: "条件: 階層ディレクトリ判定, 実行対象ディレクトリ規則"
              confidence: "user"
            - id: "LR-007"
              name: "ジャーナルの追記とリプレイ復元"
              description: "journal repository は追記専用でイベントを書き込み（行 flush）、リプレイによる Run 復元時も生成時と同じ状態遷移検証を通す"
              reason: "journal.jsonl は外部から編集可能なため、復元経路の妥当性検証を省略しない"
              source_model: "情報: 実行ジャーナル（journal.jsonl）, 状態モデル「階層実行ステータス」"
              confidence: "user"
        - id: "L-cli-gateway"
          name: "ゲートウェイ層"
          responsibility: "Driven Side の入出力。scriptexec（外部プロセス起動 + env 注入）、otlptrace（OTLP エクスポート）、sshkeyscan（SSH サーバキー取得）、htmlwriter（静的 HTML 書き出し）"
          allowed_dependencies: []
          policies:
            - id: "LP-006"
              name: "外部 I/O の成否ログ"
              description: "外部プロセス実行・OTLP 送信・SSH 接続の開始・終了・成否・処理時間を構造化ログに記録する。OTLP 送信失敗は WARN として記録し実行を継続する"
              reason: "外部依存の劣化・失敗を調査可能にしつつ、通知経路の障害を非致命に留めるため"
              source_model: "条件: OTel エクスポート失敗の非致命扱い, NFR C.3.1.1"
              confidence: "user"
          rules:
            - id: "LR-008"
              name: "env 注入契約"
              description: "scriptexec はプラグイン env 契約（stfw_* / STFW_PROJ_DIR / stfw_bizdate_start_ts 系）に従い、解決済み設定値を環境変数としてスクリプトへ公開する"
              reason: "互換境界（env 契約）の実装点を一箇所に固定するため"
              source_model: "情報: Process / Plugin 設定（config.yml）, NFR D.2.1.1"
              confidence: "user"
            - id: "LR-009"
              name: "出力先・外部ツールと 1:1 の adapter"
              description: "gateway の各 adapter は出力先・外部ツール（外部プロセス / OTLP / SSH / HTML ファイル）と 1:1 で定義し、複数の外部依存を 1 つの adapter に混在させない"
              reason: "外部依存の変更影響範囲を限定するため"
              source_model: "なし"
              confidence: "default"
      cross_layer_policies:
        - id: "CLP-001"
          name: "IF なし（直接依存）"
          description: "レイヤー間はインターフェースを介さず直接依存とし、開発スピードを優先する。外部依存の乗り換え・チーム分割が必要になった時点で該当箇所のみ凹型（IF 導入）で依存を内側に向ける"
          reason: "承認済み v1.0 計画で確定。単一チーム・依存が安定した CLI のため IF による疎結合化は過剰"
          source_model: "なし"
          confidence: "user"
        - id: "CLP-002"
          name: "エラーハンドリング伝播"
          description: "ドメインのエラーはユースケース層で集約キャッチ（ログ 1 回）し、プレゼンテーション層で終了コード（0 / 3 / 6）へ変換する。ゲートウェイ層は外部 I/O ログに記録後、エラーをそのまま返す"
          reason: "レイヤー責務の分離と多重ログ防止"
          source_model: "バリエーション: 終了コード"
          confidence: "default"
        - id: "CLP-003"
          name: "ロギング方針"
          description: "構造化ログを .stfw/stfw.log へ出力する（日次ローテーション・マスキング済み・terminal 実行時カラー）。ドメイン層はログ出力しない。ログレベルは trace〜error でデフォルト info"
          reason: "NFR C.6.1.2 ログ種別への対応と、レイヤー別ログ責務の明確化"
          source_model: "情報: 実行ログ, バリエーション: ログレベル, NFR C.6.1.2"
          confidence: "user"
      cross_layer_rules:
        - id: "CLR-001"
          name: "依存方向の固定"
          description: "presentation → usecase → domain / repository、repository → domain / gateway とし、domain はどこにも依存しない"
          reason: "最内層（ドメイン）の安定性を守る一方向依存の強制"
          source_model: "なし"
          confidence: "user"
        - id: "CLR-002"
          name: "BC 跨ぎの共有は ID とイベントのみ"
          description: "domain 内 BC パッケージ間の共有は ID とジャーナルイベントのみとする。run のジャーナルイベントが notify（OTel）と report の唯一の入力であり、BC 跨ぎの直接ファイルアクセスは禁止する"
          reason: "モジュラモノリス内の BC 境界を実装レベルで維持するため"
          source_model: "情報: 実行ジャーナル（journal.jsonl）"
          confidence: "user"
        - id: "CLR-003"
          name: "ログアンチパターン防止"
          description: "多重ログ禁止・catch 握り潰し禁止・機密情報マスキング必須・非構造化ログ禁止を全レイヤーで徹底する"
          reason: "一般的なベストプラクティスとして適用"
          source_model: "条件: シークレットマスキング"
          confidence: "default"
      diagram_mermaid: |
        graph TD
          P["presentation（cobra CLI + logger/masker）"] --> U["usecase（runscenario / scaffold / validate 等）"]
          U --> D["domain（scenario / run / notify / project・依存ゼロ）"]
          U --> R["repository（journal / scenariotree / config / secret 等）"]
          R --> D
          R --> G["gateway（scriptexec / otlptrace / sshkeyscan / htmlwriter）"]
    - tier_id: "tier-plugin"
      layers:
        - id: "L-plugin-contract"
          name: "プラグイン契約層"
          responsibility: "プラグインのエントリポイント（bin/）。env 契約（stfw_* / STFW_PROJ_DIR / stfw_bizdate_start_ts 系）の受領、config.yml 由来設定の解釈、終了コード（0 / 3 / 6）の返却"
          allowed_dependencies:
            - "L-plugin-exec"
          policies:
            - id: "LP-101"
              name: "契約のみに依存"
              description: "プラグインは env 契約と終了コード体系のみに依存し、stfw 本体の内部実装（Go パッケージ）へは依存しない"
              reason: "任意言語での実装と本体・プラグインの独立進化を可能にするため"
              source_model: "情報: プラグイン, バリエーション: 終了コード"
              confidence: "medium"
          rules: []
        - id: "L-plugin-exec"
          name: "外部ツール実行層"
          responsibility: "外部ツール（ssh / scp・RDB / KVS クライアント・k6・logfilter・compare-files）の呼び出しと、エビデンスディレクトリ規約に従うファイル入出力"
          allowed_dependencies: []
          policies:
            - id: "LP-102"
              name: "宣言済みランタイム依存のみ使用"
              description: "プラグインが呼び出す前提コマンドはランタイム依存として宣言済みのものに限定する（validate / run 前静的検証の存在チェック対象）"
              reason: "宣言と実態の乖離による実行時失敗を防ぐため"
              source_model: "条件: プラグインのランタイム依存宣言と存在チェック"
              confidence: "medium"
          rules:
            - id: "LR-101"
              name: "収集出力のエビデンスディレクトリ規約準拠"
              description: "収集系プラグインの出力は expect と同型のエビデンスディレクトリ規約に従う"
              reason: "期待値比較（compare）の入力を機械的に対応づけるため"
              source_model: "条件: エビデンスディレクトリ規約"
              confidence: "medium"
      cross_layer_policies:
        - id: "CLP-101"
          name: "カスタムプラグインは組込みの組み合わせ"
          description: "プロダクト固有のカスタムプラグインは、組込みプラグインの組み合わせとして実装する（カスタムプラグイン実装ガイドに想定パターンを文書化）"
          reason: "プロダクト固有知識を利用者側に置き、フレームワークは汎用部品に徹するため"
          source_model: "情報: カスタムプラグイン実装ガイド"
          confidence: "medium"
      cross_layer_rules:
        - id: "CLR-101"
          name: "終了コード 0 / 3 / 6 の遵守"
          description: "プラグイン・スクリプトは終了コード体系（0: SUCCESS / 3: WARN / 6: ERROR）に従う"
          reason: "ステップ成否判定と Blocked 伝播の互換性維持"
          source_model: "バリエーション: 終了コード"
          confidence: "user"
        - id: "CLR-102"
          name: "接続情報の直接記述禁止"
          description: "プラグイン内・プラグイン設定にホスト名・資格情報を直接記述せず、inventory のホストグループ名参照と secret / ssh trust の既存機構を利用する"
          reason: "接続情報の重複と平文資格情報の混入を防ぐため"
          source_model: "条件: プラグイン接続情報のグループ名参照"
          confidence: "medium"
      diagram_mermaid: |
        graph TD
          C["プラグイン契約層（bin/ エントリポイント・env 契約・終了コード）"] --> X["外部ツール実行層（ssh / scp・DB クライアント・k6・logfilter・compare-files）"]

