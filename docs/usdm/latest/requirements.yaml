  - id: "REQ-006"
    event_id: "20260708_084933_v1_rearchitecting"
    created_at: "2026-07-08T08:52:24"
    requirement: "テスト結果確認者が、実行ジャーナルをソースとする stfw status / stfw report（静的 HTML レポート）とログファイルにより実行状況と結果を確認し、失敗時の調査ができる"
    reason: "digdag 廃止により Web UI・ログ追従（run -f）による確認手段が消滅したため、実行結果の唯一のソースである実行ジャーナル（journal.jsonl）のリプレイに基づく確認手段（status / report）へ置換する。進捗把握と障害調査ができることは従来どおり必要である"
    priority: "should"
    specifications:
      - id: "SPEC-006-01"
        specification: "実行結果の唯一のソースは実行ジャーナル（.stfw/runs/{run_id}/journal.jsonl。追記専用 JSONL、node_start / steps_enumerated / step_end / node_end イベント）とする。OTel トレース（REQ-009）もジャーナルイベントの投影である"
        acceptance_criteria:
          - "Given シナリオ実行完了 When .stfw/runs/{run_id}/journal.jsonl を参照する Then 全階層・ステップの開始・終了イベントが追記専用 JSONL として記録されている"
        affected_models:
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "information"
            action: "modify"
            target: "OTel トレース（スパンツリー）"
      - id: "SPEC-006-02"
        specification: "stfw status [run_id] で実行ジャーナルをリプレイし、階層ツリー + ステータスを表示する。digdag Web UI・ログ追従（run -f）・attempt URL 案内による確認は廃止する"
        acceptance_criteria:
          - "Given シナリオ実行中または実行完了 When stfw status を実行する Then 階層ツリーと各階層・ステップのステータスが表示される"
          - "Given v1.0 の stfw When run コマンドのオプションを確認する Then ログ追従オプション（-f / --follow）は存在しない"
