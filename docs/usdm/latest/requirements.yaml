        specification: 'RDBMS 系プラグインとして exportMysql / importMysql / clearMysql、exportPostgres / importPostgres / clearPostgres を提供する。設定（config.yml の stfw.process.{type} 配下）は host_group（inventory グループ名参照）、port、database、user、tables（テーブル名リスト）等とし、パスワードは secret の {host}-{user} を自動参照する（接続情報（ホスト・パスワード）の config.yml への直接記述は禁止）。export は tables で指定したテーブルをヘッダー付き CSV でエクスポートし（エビデンス収集と期待値作成に使用）、エビデンスディレクトリ規約に従い自プロセスディレクトリ配下の evidence/{database}/{table}.csv へ出力する。CSV は RFC 4180 準拠（LF・UTF-8・必要時 quote）、1 行目はヘッダー（カラム名）とし、NULL は \N で表現して空文字と区別する（mysqldump 慣行）。import は export が出力した形式（ヘッダー付き CSV）をインポートする（export/import はラウンドトリップ可能）。clear は tables で指定したテーブルを truncate する'
