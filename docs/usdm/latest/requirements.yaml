  - id: "REQ-021"
    event_id: "20260711_041310_spec_roundtrip_invoke_config"
    created_at: "2026-07-11T04:15:46"
    requirement: "シナリオ作成者・テスト結果確認者が、invoke プラグイン（invokeRest / invokeWeb）による API / ブラウザ実行（Act）の結果を、エビデンス（k6 サマリと人間可読な HTML レポート）としてエビデンスディレクトリ規約に従い残せる"
    reason: "負荷テストや API 実行の結果を人間可読な HTML で確認・保全できることが必要である。従来 invoke 系（実行系）プラグインは実行結果をエビデンスとして残せず、収集系プラグインとエビデンスの扱いが揃っていなかったため、invoke 系にもエビデンス出力を設ける"
    priority: "should"
    specifications:
      - id: "SPEC-021-01"
        specification: "invokeRest / invokeWeb は Act 実行後、k6 の end-of-test サマリを自プロセスディレクトリ配下の evidence/summary.json へ出力する（エビデンスディレクトリ規約に従う。evidence/ は gitignore 対象）。k6 が閾値割れ等で失敗してもサマリは出力される"
        acceptance_criteria:
          - "Given invokeRest / invokeWeb の Act を実行済み When プロセスが終了する Then k6 の end-of-test サマリが {process}/evidence/summary.json へ出力される"
          - "Given k6 が閾値割れ等で失敗 When プロセスが終了する Then summary.json は出力される"
        affected_models:
          - type: "information"
            action: "modify"
            target: "エビデンス"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "external_system"
            action: "modify"
            target: "grafana k6"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-021-02"
        specification: "invokeRest / invokeWeb は HTML レポート {process}/evidence/report.html を出力する。生成の優先順は、(1) k6 web dashboard が十分なデータ（テスト実行時間が集計周期の 2 倍以上、実時間およそ 1 秒以上）でレポートを生成した場合はそれを採用、(2) 生成されない場合（単発 Act 等でデータ不足）は summary.json から自己完結の HTML をプラグイン側でフォールバック生成する。k6 が失敗してもサマリが出力されるため report.html は常に残る"
        acceptance_criteria:
          - "Given テスト実行時間が集計周期の 2 倍以上（実時間およそ 1 秒以上）で k6 web dashboard がレポートを生成 When invoke プロセスが終了する Then k6 web dashboard が生成したレポートが {process}/evidence/report.html として採用される"
          - "Given 単発 Act 等で k6 web dashboard のデータが不足しレポートが生成されない When invoke プロセスが終了する Then summary.json から自己完結の HTML がプラグイン側でフォールバック生成され {process}/evidence/report.html に出力される"
          - "Given k6 が閾値割れ等で失敗 When invoke プロセスが終了する Then report.html は常に残る"
        affected_models:
          - type: "information"
            action: "modify"
            target: "エビデンス"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "condition"
            action: "add"
            target: "invoke エビデンス HTML レポート生成の優先順"
          - type: "external_system"
            action: "modify"
            target: "grafana k6"
          - type: "actor"
            action: "modify"
            target: "テスト結果確認者"
      - id: "SPEC-021-03"
        specification: "エビデンスディレクトリ規約（第 3 の互換境界）の対象に、収集系プラグインに加えて invoke 系（実行系）のエビデンス出力（summary.json / report.html）を含める"
        acceptance_criteria:
          - "Given エビデンスディレクトリ規約 When 対象プラグインを確認する Then 収集系プラグインに加えて invoke 系（実行系）のエビデンス出力（summary.json / report.html）が対象に含まれる"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "エビデンスディレクトリ規約"
          - type: "information"
            action: "modify"
            target: "エビデンス"

  - id: "REQ-022"
    event_id: "20260711_041310_spec_roundtrip_invoke_config"
    created_at: "2026-07-11T04:15:46"
    requirement: "シナリオ作成者が、複数プロセスで共通の設定値を stfw.yml に単一ソース化し、各プロセス config には固有値（テーブル名等）だけを書けるよう、config の ${...} 展開から stfw.yml の設定値を参照できる"
    reason: "共通設定値を各プロセス config に重複記述すると、ユーザー変更時のメンテ漏れを招く。共通の identity（database / user 等）を stfw.yml に集約し、config からは ${stfw_...} で参照できるようにすることで、単一ソース化してメンテ漏れを防げるため"
    priority: "should"
    specifications:
      - id: "SPEC-022-01"
        specification: "プラグイン / プロセスの config チェーン（プラグイン既定 -> プロジェクト config/plugins/process/{type}/ -> プロセス config/config.yml）の値中の ${VAR} 展開は環境変数を参照する。stfw run 開始時に stfw.yml（+ 同梱デフォルト）のフラット化結果を実行環境へ export する（v0.2 の export_yaml 互換）ため、config から stfw.yml の設定値を ${stfw_...} で参照できる。例: DB 接続先の identity（database / user）を stfw.yml の stfw.db.database / stfw.db.user に集約し、各 postgres 系プラグインの共通設定（config/plugins/process/{type}/config.yml）から ${stfw_db_database} / ${stfw_db_user} で参照する。各シナリオのプロセス config はテーブル名だけを書く"
        acceptance_criteria:
          - "Given stfw.yml に stfw.db.database / stfw.db.user を定義し、config/plugins/process/{type}/config.yml で ${stfw_db_database} / ${stfw_db_user} を参照 When stfw run を実行する Then run 開始時に stfw.yml（+ 同梱デフォルト）のフラット化結果が実行環境へ export され、config の ${stfw_...} が stfw.yml の設定値に展開される"
          - "Given config 値中の ${VAR} When プロセスを実行する Then ${VAR} は実行環境の環境変数を参照して展開される"
          - "Given 共通の identity を stfw.yml に集約済み When 各シナリオのプロセス config を確認する Then プロセス config には固有値（テーブル名等）だけが記述され、共通設定値は重複記述されない"
        affected_models:
          - type: "information"
            action: "modify"
            target: "プロジェクト設定（stfw.yml）"
          - type: "information"
            action: "modify"
            target: "Process / Plugin 設定（config.yml）"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "condition"
            action: "add"
            target: "config の ${...} 環境変数展開（stfw.yml 値参照）"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-022-02"
        specification: "接続先ホスト・パスワードは従来どおり config に直書きせず inventory（ホスト解決）+ secret（パスワード）から解決する禁止契約を維持する。本変更は identity である database / user の集約であり、接続情報（ホスト・パスワード）の config 直書き解禁ではない"
        acceptance_criteria:
          - "Given データストア系プラグインの config When 接続情報を確認する Then 接続先ホストは inventory、パスワードは secret から解決され、config への直書きはない（禁止契約を維持）"
          - "Given 本変更の適用後 When 集約対象を確認する Then 集約されるのは identity（database / user）のみで、接続情報（ホスト・パスワード）の直書きは解禁されていない"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "プラグイン接続情報のグループ名参照"
          - type: "information"
            action: "modify"
            target: "Process / Plugin 設定（config.yml）"
