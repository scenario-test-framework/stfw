version: "1.0"
event_id: "20260713_130252_partial_run"
created_at: "2026-07-13T13:05:43"
source: "docs/usdm/変更要望_部分実行.txt"
system_name: "stfw"

requirements:
  - id: "REQ-025"
    requirement: "テスト実行者が、stfw run の部分実行として、失敗した run の途中からの再開（--from {bizdate_dir}[/{process_dir}]）と、特定ノードのピンポイント実行（--only {bizdate_dir}[/{process_dir}]）を行える"
    reason: "シナリオテストは業務日付をまたぐ長い逐次実行になるため、途中の process が失敗した場合に先頭から全体を再実行すると時間がかかる。また、特定 process の動作確認をしたい場合にも全体実行しか手段がなかった。失敗した run のやり直し（途中から再開）と、特定ノードのピンポイント実行を可能にするため"
    priority: "must"
    specifications:
      - id: "SPEC-025-01"
        specification: "再開オプション stfw run --from {bizdate_dir}[/{process_dir}] を提供する。指定ノードより実行順で前のノードをスキップし、指定ノードから最後まで実行する。process まで指定した場合は、その bizdate 内の先行 process のみスキップし、後続 bizdate は全 process を実行する"
        acceptance_criteria:
          - "Given 複数 bizdate を持つシナリオ When stfw run --from で 2 番目の bizdate_dir を指定して実行する Then 1 番目の bizdate の全 process はスキップされ、2 番目の bizdate から最後まで実行される"
          - "Given --from に {bizdate_dir}/{process_dir} まで指定 When stfw run を実行する Then その bizdate 内の先行 process のみスキップされ、指定 process 以降と後続 bizdate の全 process が実行される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
          - type: "actor"
            action: "modify"
            target: "テスト実行者"
          - type: "information"
            action: "modify"
            target: "実行（run）"
          - type: "variation"
            action: "add"
            target: "部分実行指定"
      - id: "SPEC-025-02"
        specification: "ピンポイント実行オプション stfw run --only {bizdate_dir}[/{process_dir}] を提供する。指定ノードのサブツリーのみ実行する（bizdate 指定なら配下全 process、process 指定ならその process のみ）"
        acceptance_criteria:
          - "Given 複数 bizdate を持つシナリオ When stfw run --only で bizdate_dir を指定して実行する Then 指定 bizdate 配下の全 process のみ実行され、他の bizdate は実行されない"
          - "Given --only に {bizdate_dir}/{process_dir} まで指定 When stfw run を実行する Then 指定した process のみ実行される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
          - type: "actor"
            action: "modify"
            target: "テスト実行者"
          - type: "information"
            action: "modify"
            target: "実行（run）"
          - type: "variation"
            action: "add"
            target: "部分実行指定"
      - id: "SPEC-025-03"
        specification: "部分実行の指定制約を設ける。指定パスはシナリオ相対の {bizdate_dir}[/{process_dir}]（ディレクトリ名の完全一致）とする。--from と --only は排他（同時指定はエラー）とし、空値の明示指定（--from= / --only=）もエラーとする。部分実行時に run へ指定できるシナリオは 1 つのみ（複数・重複指定はエラー）とする。--dry-run とは併用できる。指定ノードが存在しない場合は fail-fast（run_id 採番・ジャーナル作成・ハウスキープの前にエラー終了）とする。静的検証（validate 相当・プラグイン requires・接続情報直書き禁止）はフィルタ前のシナリオ全体に実施する"
        acceptance_criteria:
          - "Given --from と --only を同時指定 When stfw run を実行する Then エラー終了する"
          - "Given --from= または --only= の空値の明示指定 When stfw run を実行する Then エラー終了する"
          - "Given 部分実行の指定と複数シナリオ（または同一シナリオの重複指定） When stfw run を実行する Then エラー終了する"
          - "Given 部分実行の指定と --dry-run を併用 When stfw run を実行する Then エラーにならず dry-run の実行範囲で部分実行される"
          - "Given 存在しないノードパスを --from / --only に指定 When stfw run を実行する Then run_id の採番・ジャーナル作成・ハウスキープが行われる前にエラー終了する"
          - "Given 部分実行の指定 When run 前静的検証が実行される Then フィルタ前のシナリオ全体が検証対象になる"
        affected_models:
          - type: "condition"
            action: "add"
            target: "部分実行の指定制約"
          - type: "condition"
            action: "modify"
            target: "run 実行の前提条件"
          - type: "condition"
            action: "modify"
            target: "run 前静的検証"
          - type: "condition"
            action: "modify"
            target: "実行結果ハウスキープ"
      - id: "SPEC-025-04"
        specification: "部分実行のスキップ意味論を定める。スキップされたノードは実行されず、実行ジャーナルへ一切記録されない（node_start / node_end もフックも無い）。実行されるノードの祖先階層のフック（run / scenario / 実行対象を含む bizdate の setup・teardown）は通常どおり実行する。実行ジャーナルの run node_start の attrs に、部分実行時のみ from / only（指定パス）を記録する。スキップしたノードの副作用（データ投入等）の再現はユーザー責務とし、ツールは前提を再現しない"
        acceptance_criteria:
          - "Given --from で途中の bizdate_dir を指定して実行完了 When 実行ジャーナルを参照する Then スキップされたノードの node_start / node_end およびフックのイベントは一切記録されていない"
          - "Given 部分実行で実行完了 When 実行ジャーナルを参照する Then 実行されたノードの祖先階層のフック（run / scenario / 実行対象を含む bizdate の setup・teardown）は通常どおり実行・記録されている"
          - "Given 部分実行で実行完了 When 実行ジャーナルの run node_start を参照する Then attrs に from / only（指定パス）が記録されている"
          - "Given 部分実行の指定なしで実行完了 When 実行ジャーナルの run node_start を参照する Then attrs に from / only は記録されていない"
          - "Given スキップ対象にデータ投入等の副作用を持つ process が含まれる When 部分実行する Then ツールはスキップした process の副作用を再現しない（前提の再現はユーザー責務）"
        affected_models:
          - type: "condition"
            action: "add"
            target: "部分実行のスキップ意味論"
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "information"
            action: "modify"
            target: "実行（run）"
