version: "1.0"
event_id: "20260712_015850_warn_first_class_status"
created_at: "2026-07-12T01:58:50"
source: "docs/usdm/events/20260712_015850_warn_first_class_status/source.txt（変更要望: Warn を一級実行ステータスとして導入する）"
system_name: "stfw"

requirements:
  - id: "REQ-023"
    requirement: "テスト実行者が、プロセスプラグインのリターンコード 3（Warn）に実行意味論を持たせた一級実行ステータス Warn により、機能変更の差分確認モード（比較不一致等を Warn として最後まで実行を進める）でシナリオテストを運用でき、CI では stfw run の終了コード（全 Success=0 / Warn あり・Error なし=3 / Error あり=6）で「差分あり」を検知できる"
    reason: "シナリオテストの運用には、完全一致を確認し比較不一致で Error 停止してほしい回帰テストモード（現状の挙動）と、狙い通りの差分が全シナリオで発生することを検出したい機能変更の差分確認モードの 2 つがある。現状はプロセスプラグイン RC 契約の 3=Warn が体系上の予約に留まり、ランナーの成否判定は「0 か否か」で 3 も Error と同じ扱いになるため、比較不一致で実行が全階層停止し、比較 NG を最後まで進めて鳥瞰する後者の運用が実現できないため"
    priority: "must"
    specifications:
      - id: "SPEC-023-01"
        specification: "プロセスプラグインのリターンコード 3（Warn）に実行意味論を与える。該当ステップ / プロセスを Warn として実行ジャーナルに記録し、後続の実行は止めない。Error（6 等の非 0・非 3）は従来どおり停止 + 後続 Blocked 伝播とする。プロセスプラグイン実行契約（RC 0/3/6）自体は変えず意味論の追加のため既存プラグインは壊れないが、3 を返していたプラグインは「止まらなくなる」挙動変化があるためリリースノートで明示する"
        acceptance_criteria:
          - "Given 3 つのスクリプトを昇順配置 When 2 番目がリターンコード 3 で終了する Then 2 番目は Warn として実行ジャーナルに記録され、3 番目は実行される"
          - "Given 3 つのスクリプトを昇順配置 When 2 番目がリターンコード 6（非 0・非 3）で終了する Then 従来どおり 3 番目は実行されず Blocked と記録され実行が停止する"
          - "Given プロセスプラグイン実行契約 When RC 体系を確認する Then リターンコードは 0=Success / 3=Warn / 6=Error のまま変更されていない（意味論の追加のみ）"
          - "Given リリースノート When 挙動変化の記載を確認する Then RC 3 を返していたプラグインが「止まらなくなる」挙動変化が明示されている"
        affected_models:
          - type: "state"
            action: "modify"
            target: "ステップ実行ステータス"
          - type: "state"
            action: "modify"
            target: "階層実行ステータス"
          - type: "condition"
            action: "modify"
            target: "逐次実行・エラー時 Blocked"
          - type: "variation"
            action: "modify"
            target: "終了コード"
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "information"
            action: "modify"
            target: "ステップ実行結果"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-023-02"
        specification: "上位階層（process / bizdate / scenario / run）の実行ステータス集約は Error > Warn > Success の優先度で行う。子に Warn があれば親も Warn になる（子に Error があれば親は Error）"
        acceptance_criteria:
          - "Given プロセス内の一部ステップが Warn・残りが Success When プロセスが終了する Then プロセスの階層実行ステータスは Warn になる"
          - "Given 配下に Warn の process を含む bizdate / scenario / run When 各階層が終了する Then 各階層の実行ステータスは Warn になる（Error > Warn > Success の優先度で集約される）"
          - "Given 配下に Warn と Error の両方を含む階層 When 階層が終了する Then 階層の実行ステータスは Error になる"
        affected_models:
          - type: "state"
            action: "modify"
            target: "階層実行ステータス"
          - type: "condition"
            action: "add"
            target: "実行ステータス集約（Error > Warn > Success）"
          - type: "information"
            action: "modify"
            target: "実行（run）"
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-023-03"
        specification: "stfw run の終了コードは、全 Success=0 / Warn あり（Error なし）=3 / Error あり=6 とする。CI で「差分あり」を終了コードで検知できるようにする"
        acceptance_criteria:
          - "Given 全階層・全ステップが Success の実行 When stfw run が終了する Then 終了コードは 0 である"
          - "Given Warn を含み Error を含まない実行 When stfw run が終了する Then 終了コードは 3 であり、CI から「差分あり」を検知できる"
          - "Given Error を含む実行 When stfw run が終了する Then 終了コードは 6 である"
        affected_models:
          - type: "condition"
            action: "add"
            target: "run 終了コードの集約（0/3/6）"
          - type: "variation"
            action: "modify"
            target: "終了コード"
          - type: "information"
            action: "modify"
            target: "実行（run）"
          - type: "actor"
            action: "modify"
            target: "テスト実行者"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-023-04"
        specification: "実行ジャーナルの status に Warn を追加する。旧バージョンの run のジャーナル（Warn なし）と混在しても、report 再生成・housekeep・status が壊れないこと（後方互換）"
        acceptance_criteria:
          - "Given Warn を含む実行 When 実行ジャーナル（journal.jsonl）を参照する Then status に Warn が記録されている"
          - "Given 旧バージョンの run のジャーナル（Warn なし）と新バージョンのジャーナルが混在 When stfw report / stfw status を実行する Then いずれのジャーナルもエラーなく処理され表示・再生成される"
          - "Given 旧バージョンの run のジャーナルが混在 When stfw run 開始時のハウスキープが実行される Then 旧ジャーナルも含めて保存期間判定・削除が壊れずに動作する"
        affected_models:
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "condition"
            action: "add"
            target: "Warn ステータスの後方互換（旧ジャーナル混在）"
          - type: "condition"
            action: "modify"
            target: "実行結果ハウスキープ"
          - type: "information"
            action: "modify"
            target: "HTML レポート"
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"
      - id: "SPEC-023-05"
        specification: "teardown フックへ公開する stfw_run_status に Warn が入るケースを定義する。Warn あり・Error なしの run では stfw_run_status=Warn とする"
        acceptance_criteria:
          - "Given Warn を含み Error を含まない run When teardown フックが実行される Then 環境変数 stfw_run_status の値は Warn である"
          - "Given 全 Success の run When teardown フックが実行される Then stfw_run_status の値は従来どおり Success である"
        affected_models:
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "state"
            action: "modify"
            target: "階層実行ステータス"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"

  - id: "REQ-024"
    requirement: "テスト結果確認者が、stfw status・HTML レポート・OTLP トレースで Warn ステータスを確認でき、HTML レポートをそのまま「比較 NG の鳥瞰」ビューとして利用できる"
    reason: "機能変更の差分確認モードでは、比較不一致を Warn として最後まで実行を進めた後、どのシナリオ・どの比較で差分が発生したかを鳥瞰することが目的であり、Warn が既存の結果確認手段（status / report / OTel トレース）に表示されなければ、記録して続行しても差分の検出・調査ができないため"
    priority: "must"
    specifications:
      - id: "SPEC-024-01"
        specification: "stfw status の階層ツリー表示で Warn ステータスを黄系の色で表示する"
        acceptance_criteria:
          - "Given Warn を含む実行 When stfw status を実行する Then 該当階層・ステップのステータスが Warn として黄系の色で表示される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"
          - type: "actor"
            action: "modify"
            target: "テスト結果確認者"
      - id: "SPEC-024-02"
        specification: "HTML レポート（index + run 詳細）で Warn ステータスを黄系の色で表示する。Warn の一覧性により、レポートがそのまま「比較 NG の鳥瞰」ビューになる"
        acceptance_criteria:
          - "Given Warn を含む実行 When stfw report で HTML レポートを生成する Then 該当階層・ステップのステータスが Warn として黄系の色で表示される"
          - "Given 複数シナリオで比較不一致（Warn）が発生した実行 When HTML レポートを閲覧する Then どのシナリオ・どのプロセスで Warn（比較 NG）が発生したかを一覧で鳥瞰できる"
        affected_models:
          - type: "information"
            action: "modify"
            target: "HTML レポート"
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"
          - type: "actor"
            action: "modify"
            target: "テスト結果確認者"
      - id: "SPEC-024-03"
        specification: "OTLP トレースで Warn を表現する。OTel のスパンステータスには Warn 相当がない（Ok / Error / Unset のみ）ため、Warn はスパンステータス Ok + 属性（stfw の status 属性）で表現する"
        acceptance_criteria:
          - "Given OTLP エクスポート先設定済み When Warn のステップ / 階層を含む実行が完了する Then 該当スパンのスパンステータスは Ok であり、stfw の status 属性に Warn が記録される"
          - "Given OTLP エクスポート先設定済み When Error のステップ / 階層を含む実行が完了する Then 従来どおり該当スパンのスパンステータスは Error である"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "スパンステータス・属性マップ"
          - type: "information"
            action: "modify"
            target: "OTel トレース（スパンツリー）"
          - type: "information"
            action: "modify"
            target: "ステップ実行結果"
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"

  - id: "REQ-014"
    requirement: "シナリオ作成者が、組み込みプラグイン compare により、収集したエビデンスと期待値（expect）の比較検証（Assert）を自動実行でき、比較不一致の扱いを on_mismatch 設定で選択できる（error=ステップ失敗として停止（既定・従来挙動）/ warn=Warn として記録して続行）"
    reason: "期待値比較の自動化は回帰テスト全自動化の最終段であり、人手の目視比較では網羅性・再現性を担保できない。回帰テスト（完全一致確認）では比較不一致を既存のエラー時停止・Blocked 伝播の仕組みに載せて失敗の検知と調査を既存の結果確認手段（status / report / OTel トレース）に一元化し、機能変更の差分確認では比較不一致を Warn として最後まで実行を進めた後に比較 NG を鳥瞰する、という 2 つの運用モードを on_mismatch 設定の選択制で両立するため"
    priority: "must"
    specifications:
      - id: "SPEC-014-01"
        specification: "compare は scenario-test-framework/compare-files（別リポジトリの OSS）を利用する。compare-files の起動設定・比較レイアウトは stfw プロジェクトごとに持たせる。compare プラグインのディレクトリは、expect/（git 管理）: 直下に「同一 bizdate 内の収集系 process ディレクトリ名」を置き、その配下は当該 process の evidence/ 配下と同型にする。actual/（gitignore・自動生成）: expect と同じ構造で、実体は各収集系 process の evidence/ への symlink とする。result/（gitignore）: compare-files の比較結果出力とする。処理は、actual ディレクトリを組み立て（各収集系 process の evidence/ への symlink）→ compare-files を実行 → 比較結果を result/ へ出力、の順とする"
        acceptance_criteria:
          - "Given expect/ 直下に同一 bizdate 内の収集系 process ディレクトリ名を置き、その配下を当該 process の evidence/ 配下と同型に配置済み When compare プロセスを実行する Then actual/ が expect と同じ構造で各収集系 process の evidence/ への symlink として組み立てられ、compare-files が実行され、比較結果が result/ へ出力される"
          - "Given compare の実行後 When プロジェクトの git 管理状態を確認する Then expect/ は git 管理対象で、actual/ と result/ は gitignore 対象である"
          - "Given compare-files の起動設定・比較レイアウト When 配置場所を確認する Then stfw プロジェクトごとに保持されている"
        affected_models:
          - type: "information"
            action: "modify"
            target: "期待値（expect）"
          - type: "information"
            action: "modify"
            target: "比較結果"
          - type: "information"
            action: "modify"
            target: "エビデンス"
          - type: "external_system"
            action: "modify"
            target: "compare-files（ファイル比較 OSS）"
          - type: "condition"
            action: "modify"
            target: "エビデンスディレクトリ規約"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-014-02"
        specification: "改訂: 比較不一致の扱いは compare プラグインの設定キー on_mismatch: error（既定）| warn による選択制とする。error（既定）は従来挙動を維持し、比較不一致（compare-files exit 3）を Error（exit 6）に変換してステップ失敗とし、既存のエラー時停止・Blocked 伝播の対象とする（回帰テスト運用との後方互換）。warn のときは compare-files の比較不一致（exit 3）を exit 3 のまま返し（6 に変換しない）、該当ステップは Warn として記録され後続の実行は継続する。expect と actual が一致した場合はいずれの設定でもステップは Success となり後続処理が継続する"
        acceptance_criteria:
          - "Given on_mismatch 未設定（既定 error）で expect と actual に差分がある When compare プロセスを実行する Then 従来どおり該当ステップは Error となり、後続ステップは Blocked として記録され実行が停止する"
          - "Given on_mismatch: warn で expect と actual に差分がある When compare プロセスを実行する Then compare-files の exit 3 が exit 3 のまま返され（6 に変換されない）、該当ステップは Warn として記録され後続の実行が継続する"
          - "Given expect と actual が一致する When compare プロセスを実行する Then on_mismatch の設定によらずステップは Success となり後続処理が継続する"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "比較不一致はステップ失敗"
          - type: "condition"
            action: "modify"
            target: "逐次実行・エラー時 Blocked"
          - type: "state"
            action: "modify"
            target: "ステップ実行ステータス"
          - type: "information"
            action: "modify"
            target: "Process / Plugin 設定（config.yml）"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "variation"
            action: "add"
            target: "compare on_mismatch 設定"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"

  - id: "REQ-003"
    requirement: "テスト実行者が、ディレクトリ構造で記述したシナリオテスト（複数シナリオ）を Go 単一バイナリに内蔵された逐次実行ランナーで一括自動実行でき、実行順序の保証とエラー時停止が担保される"
    reason: "ディレクトリ構造どおりのワークフロー自動実行がフレームワークの中核目的であることは変わらない。v1.0 では外部ワークフローエンジン digdag を廃止して実行エンジンを内包したことで、server 起動などの前準備なしに 1 コマンドで実行でき、実行順序保証・エラー時停止・Blocked 伝播は内蔵ランナーが同一仕様で提供するため"
    priority: "must"
    specifications:
      - id: "SPEC-003-01"
        specification: "stfw run <scenario-names...> で run_id（_{YYYYMMDDHHMMSS}_{PID}。従来形式を維持）を採番し、内蔵ランナーで実行を開始する。run 開始前に validate 相当の静的検証（対象シナリオの存在チェック等を統合）が自動実行される。digdag プロジェクトの push・attempt_id・「digdag server が起動中であること」の前提条件は廃止し、旧 server start → run -f の 2 段階を 1 コマンドに統合する"
        acceptance_criteria:
          - "Given シナリオ存在 When stfw run を実行する Then 前準備コマンドなしに run_id が採番され実行が開始される"
          - "Given 対象シナリオが存在しない When stfw run を実行する Then run 開始前の静的検証でエラー終了する"
          - "Given v1.0 の stfw When 実行コンテキストを確認する Then attempt_id は存在せず run_id で実行が識別される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
          - type: "information"
            action: "modify"
            target: "実行（run）"
          - type: "information"
            action: "modify"
            target: "実行コンテキスト"
          - type: "condition"
            action: "modify"
            target: "run 実行の前提条件"
          - type: "condition"
            action: "delete"
            target: "run_id / attempt_id の採番・保持"
          - type: "condition"
            action: "add"
            target: "run_id の採番・保持"
          - type: "external_system"
            action: "delete"
            target: "digdag"
      - id: "SPEC-003-02"
        specification: "改訂: 内蔵ランナーが run / scenario / bizdate 各階層の setup / teardown を直接実行し（digdag からの呼び戻しは廃止）、実行ジャーナルへ開始・終了イベントを記録して階層実行ステータス（Started → Success / Warn / Error）を確定させる（Warn の集約規則は REQ-023 / SPEC-023-02 を参照）"
        acceptance_criteria:
          - "Given シナリオ実行中 When 全タスクが正常終了する Then 各階層の teardown で階層実行ステータスが Success になる"
          - "Given シナリオ実行中 When タスクがエラー終了する Then 該当階層の階層実行ステータスが Error になる"
        affected_models:
          - type: "state"
            action: "modify"
            target: "階層実行ステータス"
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "external_system"
            action: "delete"
            target: "digdag"
      - id: "SPEC-003-03"
        specification: "改訂: プロセスを setup → pre_execute → execute → post_execute → teardown の順で実行し、scripts プラグインでは scripts/ 配下をファイル名昇順に逐次実行する。エラー発生時は後続スクリプトを実行せず Blocked として記録しエラー終了する。exit 3 は Warn として記録して続行する（ステップ実行ステータス: Pending → Success / Warn / Error / Blocked。Warn の実行意味論は REQ-023 / SPEC-023-01 を参照）。これらを内蔵ランナーが提供する"
        acceptance_criteria:
          - "Given 3 つのスクリプトを昇順配置 When 2 番目がエラー終了する Then 3 番目は実行されず Blocked と記録されプロセスは Error になる"
          - "Given 全スクリプトが正常終了 When プロセスを実行する Then 全ステップが Success となりプロセスは Success になる"
        affected_models:
