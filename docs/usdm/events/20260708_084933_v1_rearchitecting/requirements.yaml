version: "1.0"
event_id: "20260708_084933_v1_rearchitecting"
created_at: "2026-07-08T08:52:24"
source: "v1.0 リアーキテクティング実装確定事項（source.txt。feature/v1-go-rearch ブランチ、docs/MIGRATION.md 参照）"
system_name: "stfw"

requirements:
  - id: "REQ-001"
    requirement: "テスト担当者が、マルチプラットフォームバイナリ / Docker image / compose.yaml のいずれかの配布物とテンプレート初期化のみでシナリオテスト実行基盤（stfw プロジェクト）を各ホストに用意できる"
    reason: "導入の容易さが利用開始の前提であることは変わらない。v1.0 で Go 単一バイナリ化したことにより、依存モジュールのダウンロード（到達不能となっていた dl.bintray.com）や JVM / Python 2 / Ruby のランタイム準備が不要になり、導入の容易さをより確実に実現できるため"
    priority: "must"
    specifications:
      - id: "SPEC-001-01"
        specification: "配布方式をマルチプラットフォームバイナリ（GitHub Releases: linux/darwin × amd64/arm64 + windows/amd64）、Docker image（ghcr.io）、compose.yaml（stfw + nginx）に変更する。tar.gz 展開 + install スクリプト（dl.bintray.com からの依存ダウンロード）は廃止する。依存モジュール（digdag jar / Tukubai / Parsrs / yaml2json）は存在せず、JVM / Python 2 / Ruby は不要とする"
        acceptance_criteria:
          - "Given GitHub Releases から対象プラットフォームのバイナリを取得済み When 実行パスに配置して stfw を実行する Then 追加のランタイム・依存モジュールなしに stfw コマンドが利用可能になる"
          - "Given ghcr.io の Docker image または compose.yaml When コンテナを起動する Then stfw コマンドが利用可能になる"
          - "Given v1.0 の配布物 When 導入手順を実施する Then install スクリプトの実行と依存モジュールのダウンロードは発生しない"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "stfw導入フロー"
          - type: "information"
            action: "modify"
            target: "stfw 本体"
          - type: "information"
            action: "delete"
            target: "依存モジュール"
          - type: "external_system"
            action: "delete"
            target: "dl.bintray.com"
          - type: "external_system"
            action: "add"
            target: "配布元（GitHub Releases / ghcr.io）"
          - type: "variation"
            action: "modify"
            target: "対応 OS 種別"
      - id: "SPEC-001-02"
        specification: "stfw init でテンプレート一式（stfw.yml / config / sample シナリオ）を展開してプロジェクトを開始できる。stfw.yml が既に存在するディレクトリでは再初期化をエラーとする（従来仕様を維持）"
        acceptance_criteria:
          - "Given 空のプロジェクトディレクトリ When stfw init を実行する Then stfw.yml・config/・scenario/sample が生成される"
          - "Given stfw.yml が存在するディレクトリ When stfw init を実行する Then エラー終了する"
        affected_models:
          - type: "information"
            action: "modify"
            target: "プロジェクト"
          - type: "condition"
            action: "modify"
            target: "プロジェクト再初期化禁止"
      - id: "SPEC-001-03"
        specification: "プロジェクト設定（stfw.yml）はデフォルト（stfw 本体の内蔵デフォルト）→ プロジェクトの順に読込・上書きされ、環境変数として全スクリプトへ公開される（従来の上書き順を維持。STFW_HOME/config は廃止）。stfw.yml の stfw.server.* 設定は廃止され、読み込み時に廃止警告を表示する"
        acceptance_criteria:
          - "Given プロジェクトの stfw.yml でデフォルト設定値を上書きした状態 When 任意のコマンドを実行する Then プロジェクト側の値が環境変数として有効になる"
          - "Given stfw.server.* 設定を含む stfw.yml When 設定を読み込む Then 廃止警告が表示され、設定値は実行に影響しない"
        affected_models:
          - type: "information"
            action: "modify"
            target: "プロジェクト設定（stfw.yml）"
          - type: "condition"
            action: "modify"
            target: "設定の上書き順"
          - type: "condition"
            action: "add"
            target: "server 設定の廃止警告"
      - id: "SPEC-001-04"
        specification: "STFW_HOME（配布ディレクトリ）概念を廃止する。プラグインに対する env 契約（stfw_* / STFW_PROJ_DIR 系の環境変数公開）は維持する"
        acceptance_criteria:
          - "Given v1.0 のバイナリ When STFW_HOME を設定せずに任意のコマンドを実行する Then 正常に動作する"
          - "Given プラグインのスクリプト When プロセスを実行する Then stfw_* / STFW_PROJ_DIR 系の環境変数が従来どおり公開されている"
        affected_models:
          - type: "information"
            action: "modify"
            target: "stfw 本体"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "condition"
            action: "modify"
            target: "プラグイン解決順"

  - id: "REQ-002"
    requirement: "シナリオ作成者が、業務日付（bizdate）をまたぐ一連の業務処理を scenario > bizdate > process の 3 階層ディレクトリ構造とスクリプトとして記述し、静的検証（stfw validate）で実行可能性を事前確認できる"
    reason: "業務日付の進行を伴うバッチ処理系業務システムのシナリオテストでは、日付単位でテストを区切って進行させる必要がある。v1.0 ではワークフロー定義（dig）の生成・管理が不要になり、記述したディレクトリ構造そのものが実行定義となるため、検証は静的検証コマンドに分離した"
    priority: "must"
    specifications:
      - id: "SPEC-002-01"
        specification: "scaffold 生成コマンドを stfw new scenario / stfw new bizdate / stfw new process に刷新する（旧 scenario -i / bizdate -i / process -i）。3 階層の scaffold（ディレクトリ・metadata.yml・config・scripts 雛形）生成と、bizdate は YYYYMMDD の 8 桁数字・seq は数値のみ・group は「_」を含まないことの検証は同一仕様で維持する"
        acceptance_criteria:
          - "Given プロジェクト初期化済み When stfw new scenario / new bizdate / new process を順に実行する Then scenario/{name}/_{seq}_{bizdate}/_{seq}_{group}_{type}/ の階層が生成される"
          - "Given bizdate scaffold 生成 When bizdate に 8 桁数字以外を指定する Then エラー終了する"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "テストシナリオ作成フロー"
          - type: "condition"
            action: "modify"
            target: "階層ディレクトリ判定"
      - id: "SPEC-002-02"
        specification: "プロセス配下の scripts/ に任意言語の実行可能ファイルをファイル名昇順 = 実行順で配置し、Process/Plugin 設定（config.yml）の値を環境変数として全スクリプトへ公開できる（組込み → プロジェクト → シナリオ内 Process 設定の順に上書き。従来仕様を維持）"
        acceptance_criteria:
          - "Given config.yml に stfw.process.{type} 配下のキーを定義 When プロセスを実行する Then 全スクリプトから環境変数として参照できる"
        affected_models:
          - type: "information"
            action: "modify"
            target: "Process / Plugin 設定（config.yml）"
      - id: "SPEC-002-03"
        specification: "ワークフロー定義（run.dig / scenario.dig / bizdate.dig）の生成を廃止し、静的検証を新コマンド stfw validate に分離する。validate はディレクトリ規約・プラグイン解決可否・config.yml を検証し、残存する *.dig ファイルには不要と警告する。run 開始前には validate 相当の静的検証が自動実行される"
        acceptance_criteria:
          - "Given 3 階層のシナリオ構造 When stfw validate を実行する Then ディレクトリ規約・プラグイン解決可否・config.yml が検証され結果が表示される"
          - "Given 旧バージョンで生成した *.dig ファイルが残存 When stfw validate を実行する Then 不要である旨の警告が表示される"
          - "Given 規約違反のあるシナリオ構造 When stfw run を実行する Then run 開始前の自動静的検証でエラーとなり実行は開始されない"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "ワークフロー定義生成・検証フロー"
          - type: "information"
            action: "delete"
            target: "ワークフロー定義（dig）"
          - type: "variation"
            action: "delete"
            target: "dig 生成モード"
          - type: "condition"
            action: "modify"
            target: "実行対象ディレクトリ規則"
          - type: "condition"
            action: "add"
            target: "run 前静的検証"
      - id: "SPEC-002-04"
        specification: "dry-run は「execute / post_execute をスキップして実行する」の意味に整理する（stfw run --dry-run。setup → pre_execute → teardown は実行される）"
        acceptance_criteria:
          - "Given シナリオ構造作成済み When stfw run --dry-run を実行する Then execute / post_execute は実行されず setup・pre_execute・teardown のみ実行される"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "dry-run の実行範囲"
          - type: "variation"
            action: "modify"
            target: "実行モード（run_mode）"

  - id: "REQ-003"
    requirement: "テスト実行者が、ディレクトリ構造で記述したシナリオテスト（複数シナリオ）を Go 単一バイナリに内蔵された逐次実行ランナーで一括自動実行でき、実行順序の保証とエラー時停止が担保される"
    reason: "ディレクトリ構造どおりのワークフロー自動実行がフレームワークの中核目的であることは変わらない。v1.0 では外部ワークフローエンジン digdag を廃止して実行エンジンを内包したことで、server 起動などの前準備なしに 1 コマンドで実行でき、実行順序保証・エラー時停止・Blocked 伝播は内蔵ランナーが同一仕様で提供するため"
    priority: "must"
    specifications:
      - id: "SPEC-003-01"
        specification: "stfw run <scenario-names...> で run_id（_{YYYYMMDDHHMMSS}_{PID}。従来形式を維持）を採番し、内蔵ランナーで実行を開始する。run 開始前に validate 相当の静的検証（対象シナリオの存在チェック等を統合）が自動実行される。digdag プロジェクトの push・attempt_id・「digdag server が起動中であること」の前提条件は廃止し、旧 server start → run -f の 2 段階を 1 コマンドに統合する"
        acceptance_criteria:
          - "Given シナリオ存在 When stfw run を実行する Then 前準備コマンドなしに run_id が採番され実行が開始される"
          - "Given 対象シナリオが存在しない When stfw run を実行する Then run 開始前の静的検証でエラー終了する"
          - "Given v1.0 の stfw When 実行コンテキストを確認する Then attempt_id は存在せず run_id で実行が識別される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
          - type: "information"
            action: "modify"
            target: "実行（run）"
          - type: "information"
            action: "modify"
            target: "実行コンテキスト"
          - type: "condition"
            action: "modify"
            target: "run 実行の前提条件"
          - type: "condition"
            action: "delete"
            target: "run_id / attempt_id の採番・保持"
          - type: "condition"
            action: "add"
            target: "run_id の採番・保持"
          - type: "external_system"
            action: "delete"
            target: "digdag"
      - id: "SPEC-003-02"
        specification: "内蔵ランナーが run / scenario / bizdate 各階層の setup / teardown を直接実行し（digdag からの呼び戻しは廃止）、実行ジャーナルへ開始・終了イベントを記録して階層実行ステータス（Started → Success / Error）を確定させる"
        acceptance_criteria:
          - "Given シナリオ実行中 When 全タスクが正常終了する Then 各階層の teardown で階層実行ステータスが Success になる"
          - "Given シナリオ実行中 When タスクがエラー終了する Then 該当階層の階層実行ステータスが Error になる"
        affected_models:
          - type: "state"
            action: "modify"
            target: "階層実行ステータス"
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "external_system"
            action: "delete"
            target: "digdag"
      - id: "SPEC-003-03"
        specification: "プロセスを setup → pre_execute → execute → post_execute → teardown の順で実行し、scripts プラグインでは scripts/ 配下をファイル名昇順に逐次実行する。エラー発生時は後続スクリプトを実行せず Blocked として記録しエラー終了する（ステップ実行ステータス: Pending → Success / Error / Blocked）。これらを内蔵ランナーが従来と同一仕様で提供する"
        acceptance_criteria:
          - "Given 3 つのスクリプトを昇順配置 When 2 番目がエラー終了する Then 3 番目は実行されず Blocked と記録されプロセスは Error になる"
          - "Given 全スクリプトが正常終了 When プロセスを実行する Then 全ステップが Success となりプロセスは Success になる"
        affected_models:
          - type: "state"
            action: "modify"
            target: "ステップ実行ステータス"
          - type: "condition"
            action: "modify"
            target: "逐次実行・エラー時 Blocked"
          - type: "external_system"
            action: "delete"
            target: "digdag"

  - id: "REQ-004"
    status: "deleted"
    requirement: "テスト実行者が、ワークフローエンジン（digdag server）の起動・停止・再起動・状態確認を行い、実行基盤を制御できる"
    reason: "廃止: 実行エンジンの内包化（Go 単一バイナリへの逐次実行ランナー内蔵）により外部ワークフローエンジン digdag が廃止され、実行基盤（digdag server）を制御するという要求自体が消滅した。シナリオ実行は stfw run の 1 コマンドで完結する（REQ-003）"
    priority: "must"
    specifications:
      - id: "SPEC-004-01"
        specification: "廃止: server start / stop / restart / status による digdag server 制御、pid ファイル管理・多重起動禁止、状態 DB（--memory / --database）・max-task-threads 設定、server 稼働状態。stfw.yml の stfw.server.* 設定は読み込み時に廃止警告を表示する"
        acceptance_criteria:
          - "Given v1.0 の stfw When stfw server の各サブコマンドを実行する Then コマンドは存在しない"
          - "Given stfw.server.* 設定を含む stfw.yml When 設定を読み込む Then 廃止警告が表示され設定は無視される"
        affected_models:
          - type: "buc"
            action: "delete"
            target: "実行基盤制御フロー"
          - type: "state"
            action: "delete"
            target: "server 稼働状態"
          - type: "information"
            action: "delete"
            target: "サーバプロセス"
          - type: "information"
            action: "delete"
            target: "状態 DB（digdag DB）"
          - type: "variation"
            action: "delete"
            target: "DB モード"
          - type: "condition"
            action: "delete"
            target: "server 多重起動禁止"
          - type: "external_system"
            action: "delete"
            target: "digdag"
      - id: "SPEC-004-02"
        specification: "廃止: stfw digdag による digdag CLI のラップ実行（digdag 自体が存在しないため）"
        acceptance_criteria:
          - "Given v1.0 の stfw When stfw digdag を実行する Then コマンドは存在しない"
        affected_models:
          - type: "information"
            action: "delete"
            target: "digdag 管理情報"
          - type: "external_system"
            action: "delete"
            target: "digdag"

  - id: "REQ-006"
    requirement: "テスト結果確認者が、実行ジャーナルをソースとする stfw status / stfw report（静的 HTML レポート）とログファイルにより実行状況と結果を確認し、失敗時の調査ができる"
    reason: "digdag 廃止により Web UI・ログ追従（run -f）による確認手段が消滅したため、実行結果の唯一のソースである実行ジャーナル（journal.jsonl）のリプレイに基づく確認手段（status / report）へ置換する。進捗把握と障害調査ができることは従来どおり必要である"
    priority: "should"
    specifications:
      - id: "SPEC-006-01"
        specification: "実行結果の唯一のソースは実行ジャーナル（.stfw/runs/{run_id}/journal.jsonl。追記専用 JSONL、node_start / steps_enumerated / step_end / node_end イベント）とする。OTel トレース（REQ-009）もジャーナルイベントの投影である"
        acceptance_criteria:
          - "Given シナリオ実行完了 When .stfw/runs/{run_id}/journal.jsonl を参照する Then 全階層・ステップの開始・終了イベントが追記専用 JSONL として記録されている"
        affected_models:
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "information"
            action: "modify"
            target: "OTel トレース（スパンツリー）"
      - id: "SPEC-006-02"
        specification: "stfw status [run_id] で実行ジャーナルをリプレイし、階層ツリー + ステータスを表示する。digdag Web UI・ログ追従（run -f）・attempt URL 案内による確認は廃止する"
        acceptance_criteria:
          - "Given シナリオ実行中または実行完了 When stfw status を実行する Then 階層ツリーと各階層・ステップのステータスが表示される"
          - "Given v1.0 の stfw When run コマンドのオプションを確認する Then ログ追従オプション（-f / --follow）は存在しない"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"
          - type: "actor"
            action: "modify"
            target: "テスト結果確認者"
          - type: "information"
            action: "delete"
            target: "digdag 管理情報"
          - type: "external_system"
            action: "delete"
            target: "digdag"
      - id: "SPEC-006-03"
        specification: "stfw report [run_id] で静的 HTML レポート（.stfw/reports/ に index + run 詳細）を生成する。実行中も process 終了ごとに増分再生成され、準リアルタイムに閲覧できる。Docker Compose 構成では nginx サービスが reports 共有 volume を配信し、ブラウザ（http://localhost:8080）でレポートを閲覧できる"
        acceptance_criteria:
          - "Given シナリオ実行完了 When stfw report を実行する Then .stfw/reports/ に index と run 詳細の静的 HTML が生成される"
          - "Given シナリオ実行中 When process が終了する Then レポートが増分再生成され準リアルタイムに閲覧できる"
          - "Given Docker Compose 構成で起動済み When ブラウザで http://localhost:8080 を開く Then nginx が配信するレポートを閲覧できる"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"
          - type: "information"
            action: "add"
            target: "HTML レポート"
      - id: "SPEC-006-04"
        specification: "ログレベル（trace / debug / info / warn / error）の設定・変更、.stfw/stfw.log への日次ローテーション集約、terminal 実行時のカラー出力、環境変数 PASSWORD / TOKEN 値の [secret] マスキングは従来仕様を維持する"
        acceptance_criteria:
          - "Given PASSWORD 環境変数を含む処理 When ログへ出力される Then 値が [secret] に置換されている"
          - "Given loglevel を debug に設定 When コマンドを実行する Then debug レベルのログが出力される"
        affected_models:
          - type: "information"
            action: "modify"
            target: "実行ログ"
          - type: "condition"
            action: "modify"
            target: "シークレットマスキング"

  - id: "REQ-007"
    requirement: "環境管理者が、環境別 inventory によるテスト対象ホストのグループ管理、資格情報の暗号化保管・参照と旧形式からの移行、SSH サーバキーの一括登録を行える"
    reason: "リモートホストへのテスト適用に伴い資格情報の平文保管を避ける必要があることは変わらない。v1.0 では外部 openssl 依存をなくすため暗号化方式を age (X25519) に刷新し、旧形式からの移行手段の提供と、旧実装では未配線だった SSH known_hosts 登録の正式コマンド化を行った"
    priority: "should"
    specifications:
      - id: "SPEC-007-01"
        specification: "環境単位の inventory ファイルにホストグループ（web / ap / db 等）を定義し、stfw inventory exists でグループ存在確認、stfw inventory list でホスト一覧取得ができる（旧 --is-exist / --list と出力互換）。グループ名 all は全グループ横断の予約値とする（従来仕様を維持）"
        acceptance_criteria:
          - "Given inventory にグループ web を定義 When stfw inventory list web を実行する Then 旧 --list と互換の出力で web グループのホスト一覧が返る"
          - "Given inventory に複数グループを定義 When グループ名 all を指定する Then 全グループのホストが対象になる"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "接続情報管理フロー"
          - type: "information"
            action: "modify"
            target: "インベントリ"
      - id: "SPEC-007-02"
        specification: "資格情報コマンドを stfw secret keygen / set / show に再編する（旧 gen-encrypt-key / passwd / passwd --show）。暗号化方式は openssl RSA + S/MIME(AES256) から age (X25519) に変更する。鍵再生成抑止・同一ホスト×ユーザーの重複登録禁止・ログのシークレットマスキングは同一仕様で維持する"
        acceptance_criteria:
          - "Given stfw secret keygen でキー生成済み When stfw secret set host user pass を実行する Then age (X25519) で暗号化された資格情報ファイルが生成される"
          - "Given 同一ホスト×ユーザー登録済み When stfw secret set で再登録する Then エラー終了する"
          - "Given キー生成済み When --force なしで stfw secret keygen を実行する Then 再生成は拒否される"
        affected_models:
          - type: "information"
            action: "modify"
            target: "暗号化キー"
          - type: "information"
            action: "modify"
            target: "パスワード"
          - type: "condition"
            action: "modify"
            target: "暗号化キー再生成の抑止"
          - type: "condition"
            action: "modify"
            target: "パスワード重複登録禁止"
          - type: "variation"
            action: "add"
            target: "資格情報暗号化方式"
      - id: "SPEC-007-03"
        specification: "stfw secret migrate を新設する。旧 S/MIME 形式を読み込み専用でサポートし、age 形式へ一括変換する（旧ファイルは .bak 退避）"
        acceptance_criteria:
          - "Given 旧 S/MIME 形式の資格情報ファイルが存在 When stfw secret migrate を実行する Then 全ファイルが age 形式に変換され、旧ファイルは .bak として退避される"
          - "Given 旧 S/MIME 形式の資格情報ファイルが存在 When 移行前に参照する Then 読み込み専用でサポートされ復号参照できる"
        affected_models:
          - type: "condition"
            action: "add"
            target: "資格情報の旧形式移行"
          - type: "information"
            action: "modify"
            target: "パスワード"
      - id: "SPEC-007-04"
        specification: "テスト対象ホストの SSH サーバキーの known_hosts 登録を stfw ssh trust <host|group> として正式コマンド化する。inventory グループ指定で一括登録できる（旧実装では未配線だった機能の配線）"
        acceptance_criteria:
          - "Given テスト対象ホスト名 When stfw ssh trust <host> を実行する Then known_hosts から旧キーが削除され新しいサーバキーが登録される"
          - "Given inventory にグループ定義済み When stfw ssh trust <group> を実行する Then グループ内全ホストのサーバキーが一括登録される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "接続情報管理フロー"
          - type: "information"
            action: "modify"
            target: "SSH サーバキー（known_hosts）"
          - type: "external_system"
            action: "modify"
            target: "テスト対象ホスト群"

  - id: "REQ-008"
    requirement: "シナリオ作成者が、プロセスタイプをプラグインとして追加・拡張できる（同梱プラグインは scripts のみ）"
    reason: "テスト対象固有のプロセス種別への対応のための拡張機構であることは変わらない。v1.0 では CLI 体系の刷新に合わせてコマンドを再編し、解決順・env 契約は互換を維持する"
    priority: "could"
    specifications:
      - id: "SPEC-008-01"
        specification: "プラグイン操作を stfw plugin list / stfw plugin install に再編する（旧 process -l / -I。解決順互換）。scaffold 生成は stfw new process で行う。同名プラグインはプロジェクト（{proj}/plugins/）→ 組込みの順に解決されプロジェクト側が優先される（従来仕様を維持。組込みの配置は STFW_HOME 廃止に伴い配布物側に変更）。プラグイン env 契約（stfw_* / STFW_PROJ_DIR 系）は維持する"
        acceptance_criteria:
          - "Given 標準構成 When stfw plugin list を実行する Then 同梱プラグイン scripts が一覧表示される"
          - "Given プロジェクトに同名プラグインを配置 When プロセスタイプを解決する Then 従来と互換の解決順でプロジェクト側プラグインが優先される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "プロセスプラグイン拡張フロー"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "condition"
            action: "modify"
            target: "プラグイン解決順"
          - type: "variation"
            action: "modify"
            target: "プラグインスコープ"

  - id: "REQ-011"
    requirement: "開発者が、フレームワーク自体の品質を Go 標準のテスト・静的解析と GitHub Actions の CI/CD で継続的に保証できる"
    reason: "bash 実装向けの検証基盤（shunit2 / serverspec / kcov / shellcheck / Travis CI）は Go 移行後の実装を検証できない。保守性を確保するには Go 対応のテスト・lint と、配布（goreleaser / ghcr.io）まで一貫した現行 CI/CD 基盤への刷新が必要なため"
    priority: "should"
    specifications:
      - id: "SPEC-011-01"
        specification: "フレームワーク自体の検証を Go の単体テスト + testscript 受け入れテスト + golangci-lint に変更する（shunit2 / serverspec / kcov / shellcheck / Travis CI は廃止）"
        acceptance_criteria:
          - "Given リポジトリのソースコード When go test と golangci-lint を実行する Then 単体テスト・testscript 受け入れテスト・lint が実行できる"
          - "Given v1.0 のリポジトリ When 検証基盤を確認する Then shunit2 / serverspec / kcov / shellcheck / Travis CI の構成は存在しない"
        affected_models:
          - type: "external_system"
            action: "add"
            target: "開発 CI 基盤（GitHub Actions）"
      - id: "SPEC-011-02"
        specification: "CI/CD は GitHub Actions で行う。PR で lint + test、master マージで snapshot ビルド、tag 付与で goreleaser によるリリースと ghcr.io への配布を実行する"
        acceptance_criteria:
          - "Given PR 作成 When CI が実行される Then lint と test が実行される"
          - "Given master へのマージ When CI が実行される Then snapshot ビルドが実行される"
          - "Given tag 付与 When CI が実行される Then goreleaser によるリリース成果物の公開と ghcr.io への Docker image 配布が実行される"
        affected_models:
          - type: "external_system"
            action: "modify"
            target: "開発 CI 基盤（GitHub Actions）"
          - type: "external_system"
            action: "modify"
            target: "配布元（GitHub Releases / ghcr.io）"
