          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
      - id: "SPEC-013-03"
        specification: "対象製品は代表的な OSS のみとし、public cloud のマネージド製品はまだ対象にしない。RDBMS は MySQL（MariaDB は MySQL 互換として同一プラグインでサポート）と PostgreSQL、KVS は Redis（Valkey は Redis 互換として同一プラグインでサポート）とする。将来の製品追加はプラグイン追加で対応する"
        acceptance_criteria:
          - "Given MariaDB / Valkey のテスト対象 When MySQL 用 / Redis 用プラグインを利用する Then 互換製品として同一プラグインでサポートされる"
          - "Given データストア系プラグインのサポート範囲 When 対象製品を確認する Then 代表的な OSS（MySQL・PostgreSQL・Redis）のみで、public cloud のマネージド製品は含まれない"
        affected_models:
          - type: "variation"
            action: "modify"
            target: "対応データストア製品"
          - type: "external_system"
            action: "modify"
            target: "テスト対象データストア（MySQL / PostgreSQL / Redis）"

  - id: "REQ-014"
    requirement: "シナリオ作成者が、組み込みプラグイン compare により、収集したエビデンスと期待値（expect）の比較検証（Assert）を自動実行でき、比較不一致はステップ失敗として扱われる"
    reason: "期待値比較の自動化は回帰テスト全自動化の最終段であり、人手の目視比較では網羅性・再現性を担保できない。比較不一致を既存のエラー時停止・Blocked 伝播の仕組みに載せることで、失敗の検知と調査を既存の結果確認手段（status / report / OTel トレース）に一元化できるため"
    priority: "must"
    specifications:
      - id: "SPEC-014-01"
        specification: "compare は scenario-test-framework/compare-files（別リポジトリの OSS）を利用する。compare-files の起動設定・比較レイアウトは stfw プロジェクトごとに持たせる。compare プラグインのディレクトリは、expect/（git 管理）: 直下に「同一 bizdate 内の収集系 process ディレクトリ名」を置き、その配下は当該 process の evidence/ 配下と同型にする。actual/（gitignore・自動生成）: expect と同じ構造で、実体は各収集系 process の evidence/ への symlink とする。result/（gitignore）: compare-files の比較結果出力とする。処理は、actual ディレクトリを組み立て（各収集系 process の evidence/ への symlink）→ compare-files を実行 → 比較結果を result/ へ出力、の順とする"
        acceptance_criteria:
          - "Given expect/ 直下に同一 bizdate 内の収集系 process ディレクトリ名を置き、その配下を当該 process の evidence/ 配下と同型に配置済み When compare プロセスを実行する Then actual/ が expect と同じ構造で各収集系 process の evidence/ への symlink として組み立てられ、compare-files が実行され、比較結果が result/ へ出力される"
          - "Given compare の実行後 When プロジェクトの git 管理状態を確認する Then expect/ は git 管理対象で、actual/ と result/ は gitignore 対象である"
          - "Given compare-files の起動設定・比較レイアウト When 配置場所を確認する Then stfw プロジェクトごとに保持されている"
        affected_models:
          - type: "information"
            action: "modify"
            target: "期待値（expect）"
          - type: "information"
            action: "modify"
            target: "比較結果"
          - type: "information"
            action: "modify"
            target: "エビデンス"
          - type: "external_system"
            action: "modify"
            target: "compare-files（ファイル比較 OSS）"
          - type: "condition"
            action: "modify"
            target: "エビデンスディレクトリ規約"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-014-02"
        specification: "比較不一致はステップ失敗とし、既存のエラー時停止・Blocked 伝播の対象とする"
        acceptance_criteria:
          - "Given expect と actual に差分がある When compare プロセスを実行する Then 該当ステップは Error となり、後続ステップは Blocked として記録され実行が停止する"
          - "Given expect と actual が一致する When compare プロセスを実行する Then ステップは Success となり後続処理が継続する"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "比較不一致はステップ失敗"
          - type: "condition"
            action: "modify"
            target: "逐次実行・エラー時 Blocked"
          - type: "state"
            action: "modify"
            target: "ステップ実行ステータス"

  - id: "REQ-016"
    requirement: "シナリオ作成者・環境管理者が、組み込みプラグイン群を既存の接続情報管理（inventory / secret / ssh trust）と統一された互換境界（ディレクトリ規約・プラグイン env 契約・エビデンスディレクトリ規約）のもとで安全に利用でき、プラグインのランタイム依存を実行前に検出できる"
    reason: "プラグインごとに接続情報の持ち方・出力構造・依存の準備方法がばらつくと、設定の重複・平文資格情報の混入・実行時になって判明する依存不足を招く。横断規約として統一することで、組み込みプラグインとカスタムプラグインの 2 層構造によるエコシステム全体の互換性と安全性を担保するため"
    priority: "must"
    specifications:
      - id: "SPEC-016-01"
        specification: "収集先・接続先ホストは既存の inventory（ホストグループ）を参照し、資格情報は secret（age 暗号化）、SSH ホストキーは ssh trust を利用する。プラグイン設定は config.yml の stfw.process.{type} 配下に置き、既存の env フラット化規則で全スクリプトへ環境変数として公開される。設定スキーマは、収集系プラグインが targets リスト（group: inventory グループ名参照、paths: 収集ファイルパス正規表現リスト）、データストア系プラグインが host_group（inventory グループ名参照）・port・database・user・tables（テーブル名リスト）等とする。データストア系のパスワードは secret の {host}-{user} を自動参照する。接続情報（ホスト・パスワード）を config.yml に直接書くことは禁止する"
        acceptance_criteria:
          - "Given 組み込みプラグインの設定（config.yml） When 収集先・接続先を指定する Then 収集系は targets（group / paths）、データストア系は host_group 等の inventory グループ名参照のみで指定でき、ホスト名・資格情報は直接記述しない"
          - "Given stfw.process.{type} 配下のプラグイン設定 When プロセスを実行する Then 既存の env フラット化規則で全スクリプトへ環境変数として公開される"
          - "Given データストア系プラグインの接続 When 資格情報を利用する Then secret（age 暗号化）の {host}-{user} が自動参照され、SSH 接続では ssh trust（known_hosts）の既存機構が利用される"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "プラグイン接続情報のグループ名参照"
          - type: "information"
            action: "modify"
            target: "インベントリ"
          - type: "information"
            action: "modify"
            target: "パスワード"
          - type: "information"
            action: "modify"
            target: "SSH サーバキー（known_hosts）"
          - type: "information"
            action: "modify"
            target: "Process / Plugin 設定（config.yml）"
          - type: "buc"
            action: "modify"
            target: "接続情報管理フロー"
      - id: "SPEC-016-02"
        specification: "エビデンスディレクトリ規約を定める。収集系プラグイン（collectFile / collectLog / exportXxx）の出力ルートは自プロセスディレクトリ配下の evidence/（gitignore 対象）とし、collectFile / collectLog は evidence/{host}/{収集元の絶対パスをそのまま再現}、exportMysql / exportPostgres は evidence/{database}/{table}.csv、exportRedis は evidence/{host}/{keyパターン名}.csv へ出力する。compare プラグインのディレクトリは、expect/（git 管理。直下に同一 bizdate 内の収集系 process ディレクトリ名を置き、その配下は当該 process の evidence/ 配下と同型）、actual/（gitignore・自動生成。expect と同じ構造で実体は各収集系 process の evidence/ への symlink）、result/（gitignore。compare-files の比較結果出力）とする。本規約はディレクトリ規約・プラグイン env 契約に次ぐ第 3 の互換境界として文書化する"
        acceptance_criteria:
          - "Given 収集系プラグインの出力 When 出力先を確認する Then 自プロセスディレクトリ配下の evidence/（gitignore 対象）に、collectFile / collectLog は {host}/{収集元の絶対パス}、exportMysql / exportPostgres は {database}/{table}.csv、exportRedis は {host}/{keyパターン名}.csv として配置される"
          - "Given compare の expect/ ディレクトリ When 構造を確認する Then 直下に同一 bizdate 内の収集系 process ディレクトリ名が置かれ、その配下は当該 process の evidence/ 配下と同型である"
          - "Given エビデンスディレクトリ規約 When 互換境界の位置づけを確認する Then ディレクトリ規約・プラグイン env 契約に次ぐ第 3 の互換境界として文書化されている"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "エビデンスディレクトリ規約"
          - type: "information"
            action: "modify"
            target: "エビデンス"
          - type: "information"
            action: "modify"
            target: "期待値（expect）"
          - type: "information"
            action: "modify"
