  - id: "REQ-013"
    requirement: "シナリオ作成者が、組み込みプラグイン export / import / clear（MySQL・PostgreSQL・Redis）により、テスト対象データストアのデータ準備（Arrange）とデータのエビデンス収集・期待値作成（Collect）を自動化できる"
    reason: "回帰テストではテスト前のデータ準備・後片付けと実行後のデータ確認が、実行そのものと同等以上の工数を要する。export / import / clear を汎用部品として提供することで、データ準備・後片付け・エビデンス収集・期待値作成を人手を介さず業務日付ごとに反復できるため"
    priority: "must"
    specifications:
      - id: "SPEC-013-01"
        specification: 'RDBMS 系プラグインとして exportMysql / importMysql / clearMysql、exportPostgres / importPostgres / clearPostgres を提供する。設定（config.yml の stfw.process.{type} 配下）は host_group（inventory グループ名参照）、port、database、user、tables（テーブル名リスト）等とし、パスワードは secret の {host}-{user} を自動参照する（接続情報（ホスト・パスワード）の config.yml への直接記述は禁止）。export は tables で指定したテーブルをヘッダー付き CSV でエクスポートし（エビデンス収集と期待値作成に使用）、エビデンスディレクトリ規約に従い自プロセスディレクトリ配下の evidence/{database}/{table}.csv へ出力する。CSV は RFC 4180 準拠（LF・UTF-8・必要時 quote）、1 行目はヘッダー（カラム名）とし、NULL は \N で表現して空文字と区別する（mysqldump 慣行）。import は export が出力した形式（ヘッダー付き CSV）をインポートする（export/import はラウンドトリップ可能）。clear は tables で指定したテーブルを truncate する'
        acceptance_criteria:
          - 'Given host_group・port・database・user・tables を設定済み When exportMysql / exportPostgres プロセスを実行する Then 指定テーブルが RFC 4180 準拠（LF・UTF-8・必要時 quote）のヘッダー付き CSV として evidence/{database}/{table}.csv へエクスポートされ、NULL は \N で表現される'
          - 'Given export が出力したヘッダー付き CSV When importMysql / importPostgres プロセスを実行する Then NULL（\N）と空文字が区別されたまま同一データがインポートされる（export/import はラウンドトリップ可能）'
          - "Given tables を設定済み When clearMysql / clearPostgres プロセスを実行する Then 指定テーブルが truncate される"
          - "Given データストア系プラグインの設定（config.yml） When 接続情報を確認する Then パスワードは secret の {host}-{user} が自動参照され、ホスト・パスワードの直接記述はない"
        affected_models:
          - type: "information"
            action: "modify"
            target: "エビデンス"
          - type: "information"
            action: "modify"
            target: "期待値（expect）"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "information"
            action: "modify"
            target: "Process / Plugin 設定（config.yml）"
          - type: "information"
            action: "modify"
            target: "パスワード"
          - type: "external_system"
            action: "modify"
            target: "テスト対象データストア（MySQL / PostgreSQL / Redis）"
          - type: "condition"
            action: "modify"
            target: "export/import ラウンドトリップ互換"
          - type: "condition"
            action: "modify"
            target: "プラグイン接続情報のグループ名参照"
          - type: "condition"
            action: "modify"
            target: "エビデンスディレクトリ規約"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-013-02"
        specification: "KVS 系プラグインとして Redis に対し RDBMS 系と同じバリエーション（exportRedis / importRedis / clearRedis）を提供する。exportRedis はヘッダー付き CSV（key,type,ttl,value）とし、エビデンスディレクトリ規約に従い自プロセスディレクトリ配下の evidence/{host}/{keyパターン名}.csv へ出力する。value は string 型は生値、hash / list / set / zset 型はキー順ソートの正規化 JSON で表現する（compare の安定性のため）。import は export が出力した形式をインポートする（ラウンドトリップ可能）"
        acceptance_criteria:
          - "Given Redis の接続対象と key パターンを設定済み When exportRedis プロセスを実行する Then ヘッダー（key,type,ttl,value）付き CSV が evidence/{host}/{keyパターン名}.csv へ出力される"
          - "Given hash / list / set / zset 型のキーを含むデータ When exportRedis プロセスを実行する Then value がキー順ソートの正規化 JSON で表現され、同一データからは常に同一の CSV が得られる"
          - "Given exportRedis が出力した CSV When importRedis プロセスを実行する Then 同一データがインポートされる（ラウンドトリップ可能）"
        affected_models:
          - type: "information"
