system_name: "stfw"

requirements:
  - id: "REQ-012"
    requirement: "シナリオ作成者が、組み込みプラグイン collectLog / collectFile により、テスト対象ホストから実行ログ・ファイル（外部 IF ファイル等）をエビデンスとしてローカルへ自動収集できる（Collect フェーズ）"
    reason: "回帰テストの全自動化にはエビデンス収集の自動化が不可欠であり、業務日付をまたぐ長時間シナリオでは手作業収集は非現実的である。期待値比較（compare）の入力となる収集結果を、規約化されたディレクトリ構造で機械的に集める汎用部品が必要なため"
    priority: "must"
    specifications:
      - id: "SPEC-012-01"
        specification: "collectLog はテスト対象ホストからの実行ログ収集を行う。scenario-test-framework/logfilter（別リポジトリの OSS バイナリ）を利用し、設定（config.yml の stfw.process.{type} 配下）は targets リスト（group: inventory グループ名参照、paths: 収集ファイルパス正規表現リスト）とする。処理は、scp で logfilter バイナリを収集先ホストへ転送 → ssh で実行し「bizdate の実行開始日時」以降のログ行にフィルタ → scp でローカルへ収集 → 転送したバイナリを削除、の順とする。収集結果はエビデンスディレクトリ規約に従い、自プロセスディレクトリ配下の evidence/{host}/{収集元の絶対パスをそのまま再現} へ出力する（evidence/ は gitignore 対象）。フィルタ基準時刻は実行ジャーナルの bizdate node_start イベント時刻を使用し、プラグイン env 契約に追加する環境変数 stfw_bizdate_start_ts（RFC3339 形式）として公開する。収集先ホストとの時刻同期を前提とし、この制約はドキュメントに明記する"
        acceptance_criteria:
          - "Given targets（group: inventory グループ名参照、paths: 収集ファイルパス正規表現リスト）を設定済み When collectLog プロセスを実行する Then logfilter が scp で転送・ssh で実行され、bizdate の実行開始日時以降のログ行のみが自プロセスディレクトリ配下の evidence/{host}/{収集元の絶対パス} へ収集され、転送したバイナリは削除される"
          - "Given bizdate の実行中 When collectLog がフィルタ基準時刻を参照する Then 実行ジャーナルの bizdate node_start イベント時刻が RFC3339 形式の環境変数 stfw_bizdate_start_ts（プラグイン env 契約）として公開されている"
          - "Given collectLog の利用ドキュメント When 前提制約を確認する Then 収集先ホストとの時刻同期が制約として明記されている"
        affected_models:
