      - id: "SPEC-012-02"
        specification: "collectFile はテスト対象ホストからのファイル収集（外部 IF ファイル等）を行う。設定（config.yml の stfw.process.{type} 配下）は targets リスト（group: inventory グループ名参照、paths: 収集ファイルパス正規表現リスト）とし、scp で収集先ホストのファイルをエビデンスディレクトリ規約に従い自プロセスディレクトリ配下の evidence/{host}/{収集元の絶対パスをそのまま再現} へ収集する（evidence/ は gitignore 対象）"
        acceptance_criteria:
          - "Given targets（group: inventory グループ名参照、paths: 収集ファイルパス正規表現リスト）を設定済み When collectFile プロセスを実行する Then 対象ホストのファイルが scp で自プロセスディレクトリ配下の evidence/{host}/{収集元の絶対パス} へ収集される"
        affected_models:
