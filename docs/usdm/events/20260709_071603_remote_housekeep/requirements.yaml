          - type: "external_system"
            action: "modify"
            target: "テスト対象ホスト群"
          - type: "condition"
            action: "add"
            target: "scpPut の原子的配置"
          - type: "condition"
            action: "modify"
            target: "プラグイン接続情報のグループ名参照"
          - type: "condition"
            action: "modify"
            target: "プラグインのランタイム依存宣言と存在チェック"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"

  - id: "REQ-019"
    event_id: "20260709_071603_remote_housekeep"
    created_at: "2026-07-09T07:18:33"
    requirement: "テスト実行者が、stfw run の開始時に、保存期間を過ぎた過去の実行結果（実行ジャーナルと HTML レポート）を自動削除（ハウスキープ）でき、継続的に利用しても実行結果の累積でストレージが逼迫しない"
    reason: "run 毎に実行ジャーナル（.stfw/runs/{run_id}/）と HTML レポート（.stfw/reports/runs/{run_id}.html + index）が累積するため、継続利用にはこれらの自動削除が必要である。旧 Bash+digdag 版の digdag project / db / server の daily job は v1.0（サーバレス）に存在しないため、専用サブコマンドや常駐ジョブを設けず、run の開始時の振る舞いとして統合することで、run を回すだけで実質的にハウスキープが維持されるため（エビデンスは scenario 配下の固定パスで毎回上書きされ累積しないため対象外）"
    priority: "should"
    specifications:
      - id: "SPEC-019-01"
        specification: "stfw.yml で実行結果の保存期間を指定できる（例: stfw.housekeep.retention）。ハウスキープは専用サブコマンドではなく stfw run の開始時の振る舞いとして自動実行され、保存期間を過ぎた実行ジャーナル（.stfw/runs/{run_id}）が物理削除される"
        acceptance_criteria:
          - "Given stfw.yml に実行結果の保存期間を設定済み When stfw run を実行する Then run 開始時に、保存期間を過ぎた .stfw/runs/{run_id} が物理削除される"
          - "Given ハウスキープの実行契機 When 実行方法を確認する Then 専用サブコマンドではなく stfw run の開始時の振る舞いとして自動実行される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
          - type: "actor"
            action: "modify"
            target: "テスト実行者"
          - type: "information"
            action: "modify"
            target: "プロジェクト設定（stfw.yml）"
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "information"
            action: "modify"
            target: "実行（run）"
          - type: "condition"
            action: "add"
            target: "実行結果ハウスキープ"
          - type: "variation"
            action: "add"
            target: "実行結果保存期間設定"
      - id: "SPEC-019-02"
        specification: "保存期間を過ぎた HTML レポート（.stfw/reports/runs/{run_id}.html）が物理削除され、削除に伴いレポート index が再生成される（削除済み run が index に残らない）。本処理も stfw run 開始時のハウスキープの一部として実行される"
        acceptance_criteria:
          - "Given 保存期間を過ぎた HTML レポートが存在 When stfw run を実行する Then 該当 .stfw/reports/runs/{run_id}.html が物理削除される"
          - "Given HTML レポートの物理削除後 When レポート index を確認する Then index が再生成され、削除済み run は index に残らない"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"
          - type: "information"
            action: "modify"
            target: "HTML レポート"
          - type: "condition"
            action: "modify"
            target: "実行結果ハウスキープ"
      - id: "SPEC-019-03"
        specification: "daily 実行の仕組みは v1.0（サーバレス）では提供しない。定期実行が必要な場合は cron 等の外部スケジューラから stfw run を回す運用とする（run 都度ハウスキープされるため、保存期間の維持は実質的に成立する）。旧 Bash+digdag 版の digdag project / db / server の daily job は v1.0 に存在しないため要求に含めない"
        acceptance_criteria:
          - "Given v1.0 の stfw When ハウスキープ専用の常駐ジョブや daily 実行の仕組みを確認する Then それらは提供されず、定期実行は外部スケジューラ（cron 等）からの stfw run で行う運用となる"
          - "Given 外部スケジューラから stfw run を定期実行する運用 When 各回の run が開始する Then 各回のハウスキープにより保存期間を過ぎた実行結果が継続的に削除される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
          - type: "condition"
            action: "modify"
            target: "実行結果ハウスキープ"
