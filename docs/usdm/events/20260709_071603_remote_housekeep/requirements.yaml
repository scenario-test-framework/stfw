system_name: "stfw"

requirements:
  - id: "REQ-018"
    event_id: "20260709_071603_remote_housekeep"
    created_at: "2026-07-09T07:18:33"
    requirement: "シナリオ作成者が、組み込みプラグイン sshExec / scpPut（リモートアクセス系）により、複数ホストへの ssh でのリモートスクリプト一括実行（Act）とローカルファイルの scp 配置（Arrange）を、既存の接続情報管理（inventory グループ + secret + ssh trust）を再利用してルール化・自動実行できる"
    reason: "テスト対象システムのバウンダリスクリプト実行や外部 IF ファイル配置は複数ホストに対して繰り返し発生する作業であり、利用者ごとに ssh / scp を個別に組むと接続情報の重複・平文資格情報の混入・手順のばらつきを招く。収集系（collectLog / collectFile）が担うエビデンス収集用途とは逆方向の「リモート実行」「ファイル配置」を汎用部品として提供することで、既存の互換境界（inventory / secret / ssh trust・プラグイン env 契約）のもとで安全に反復できるため（scp get はエビデンス収集用途の collectFile / collectLog が担うため今回のスコープ外とする）"
    priority: "should"
    specifications:
      - id: "SPEC-018-01"
        specification: "sshExec は ssh でリモートスクリプトを一括実行する。接続先は inventory のグループで指定し、ログインユーザを config.yml（stfw.process.{type} 配下）で指定する（ホスト + ユーザのグルーピング）。パスワードは secret（age 暗号化）の {host}-{user} から自動参照し、config.yml への直書きは禁止する。SSH ホストキーは ssh trust（known_hosts）の既存機構を利用する。処理は、自プロセスの scripts/ ディレクトリ配下のスクリプトを、解決した各ホストへ ssh 経由で送り、ファイル名昇順に一括実行する。エラー発生時（リターンコード 6）は即時終了し、以降のスクリプトを実行しない"
        acceptance_criteria:
          - "Given inventory グループとログインユーザを config.yml に設定済み（パスワードは secret に登録済み） When sshExec プロセスを実行する Then 解決した各ホストへ scripts/ 配下のスクリプトが ssh 経由で送られ、ファイル名昇順に一括実行される"
          - "Given sshExec の接続設定 When 接続情報を確認する Then 接続先は inventory グループ名参照・ログインユーザは config.yml 指定・パスワードは secret の {host}-{user} 自動参照であり、ホスト名・パスワードの config.yml への直書きはない"
          - "Given 昇順配置された複数スクリプト When 途中のスクリプトがエラー終了する Then 以降のスクリプトは実行されず sshExec はリターンコード 6 で即時終了する"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "information"
            action: "modify"
            target: "Process / Plugin 設定（config.yml）"
          - type: "information"
            action: "modify"
            target: "インベントリ"
          - type: "information"
            action: "modify"
            target: "パスワード"
          - type: "information"
            action: "modify"
            target: "SSH サーバキー（known_hosts）"
          - type: "external_system"
            action: "modify"
            target: "テスト対象ホスト群"
          - type: "condition"
            action: "add"
            target: "sshExec のリモートスクリプト一括実行"
          - type: "condition"
            action: "modify"
            target: "プラグイン接続情報のグループ名参照"
          - type: "condition"
            action: "modify"
            target: "プラグインのランタイム依存宣言と存在チェック"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
      - id: "SPEC-018-02"
        specification: "scpPut は scp でローカルファイルをリモートホストへ配置する。接続先は inventory のグループで指定し、ログインユーザを config.yml（stfw.process.{type} 配下）で指定する。パスワードは secret（age 暗号化）の {host}-{user} から自動参照し、config.yml への直書きは禁止する。SSH ホストキーは ssh trust（known_hosts）の既存機構を利用する。グループ毎に配置先ディレクトリを指定でき、ローカルの target/{グループ} 毎のディレクトリ構成を一括で put する。まず一時ディレクトリへ scp put した後、指定した配置先ディレクトリへ mv して原子的に配置する"
        acceptance_criteria:
          - "Given inventory グループ・ログインユーザ・グループ毎の配置先ディレクトリを config.yml に設定済み（パスワードは secret に登録済み） When scpPut プロセスを実行する Then ローカルの target/{グループ} 配下のディレクトリ構成が解決した各ホストへ一括で put される"
          - "Given scpPut の配置処理 When 配置手順を確認する Then 一時ディレクトリへ scp put した後に指定ディレクトリへ mv され、原子的に配置される"
          - "Given scpPut の接続設定 When 接続情報を確認する Then 接続先は inventory グループ名参照・ログインユーザは config.yml 指定・パスワードは secret の {host}-{user} 自動参照であり、ホスト名・パスワードの config.yml への直書きはない"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
          - type: "information"
