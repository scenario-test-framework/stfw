system_name: "stfw"

requirements:
  - id: "REQ-006"
    event_id: "20260721_210722_retract_filelog_timezone_reflect_parallel"
    created_at: "2026-07-21T21:07:22"
    requirement: "改訂: テスト結果確認者が、実行ジャーナルをソースとする stfw status / stfw report（静的 HTML レポート）と stderr への構造化ログにより実行状況と結果を確認し、失敗時の調査ができる"
    reason: "digdag 廃止により Web UI・ログ追従（run -f）による確認手段が消滅したため、実行結果の唯一のソースである実行ジャーナル（journal.jsonl）のリプレイに基づく確認手段（status / report）へ置換する。進捗把握と障害調査ができることは従来どおり必要である。改訂: ファイルログ（.stfw/stfw.log への集約・日次ローテーション・terminal 実行時のカラー出力）の要求はプロダクトオーナーの決定により撤回する（実装しない）。stderr への構造化ログ（slog + シークレットマスキング）と、HTML レポート・OTLP トレースによる実行状況の可視化で運用要求を満たすと判断した"
    priority: "should"
    specifications:
      - id: "SPEC-006-01"
        specification: "実行結果の唯一のソースは実行ジャーナル（.stfw/runs/{run_id}/journal.jsonl。追記専用 JSONL、node_start / steps_enumerated / step_end / node_end イベント）とする。OTel トレース（REQ-009）もジャーナルイベントの投影である"
        acceptance_criteria:
          - "Given シナリオ実行完了 When .stfw/runs/{run_id}/journal.jsonl を参照する Then 全階層・ステップの開始・終了イベントが追記専用 JSONL として記録されている"
        affected_models:
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "information"
            action: "modify"
            target: "OTel トレース（スパンツリー）"
      - id: "SPEC-006-02"
        specification: "stfw status [run_id] で実行ジャーナルをリプレイし、階層ツリー + ステータスを表示する。digdag Web UI・ログ追従（run -f）・attempt URL 案内による確認は廃止する"
        acceptance_criteria:
          - "Given シナリオ実行中または実行完了 When stfw status を実行する Then 階層ツリーと各階層・ステップのステータスが表示される"
          - "Given v1.0 の stfw When run コマンドのオプションを確認する Then ログ追従オプション（-f / --follow）は存在しない"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"
          - type: "actor"
            action: "modify"
            target: "テスト結果確認者"
          - type: "information"
            action: "delete"
            target: "digdag 管理情報"
          - type: "external_system"
            action: "delete"
            target: "digdag"
      - id: "SPEC-006-03"
        specification: "stfw report [run_id] で静的 HTML レポート（.stfw/reports/ に index + run 詳細）を生成する。実行中も process 終了ごとに増分再生成され、準リアルタイムに閲覧できる。Docker Compose 構成では nginx サービスが reports 共有 volume を配信し、ブラウザ（http://localhost:8080）でレポートを閲覧できる"
        acceptance_criteria:
          - "Given シナリオ実行完了 When stfw report を実行する Then .stfw/reports/ に index と run 詳細の静的 HTML が生成される"
          - "Given シナリオ実行中 When process が終了する Then レポートが増分再生成され準リアルタイムに閲覧できる"
          - "Given Docker Compose 構成で起動済み When ブラウザで http://localhost:8080 を開く Then nginx が配信するレポートを閲覧できる"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"
          - type: "information"
            action: "add"
            target: "HTML レポート"
      - id: "SPEC-006-04"
        specification: "改訂: ログは stderr への構造化ログ出力とし、ログレベル（trace / debug / info / warn / error）の設定・変更と、環境変数 PASSWORD / TOKEN 値の [secret] マスキングを維持する。ファイルログの要求（.stfw/stfw.log への集約・日次ローテーション・terminal 実行時のカラー出力（ファイルはプレーン））は撤回する（実装しない）。実行状況の可視化は HTML レポート（SPEC-006-03）と OTLP トレース（REQ-009）が担う"
        acceptance_criteria:
          - "Given PASSWORD 環境変数を含む処理 When ログへ出力される Then 値が [secret] に置換されている"
          - "Given loglevel を debug に設定 When コマンドを実行する Then debug レベルのログが stderr へ出力される"
          - "Given 任意のコマンド実行 When ログ出力先を確認する Then ログファイル（.stfw/stfw.log）は生成されず、ログは stderr への構造化ログとして出力される"
        affected_models:
          - type: "information"
            action: "modify"
            target: "実行ログ"
          - type: "condition"
            action: "modify"
            target: "シークレットマスキング"
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"

  - id: "REQ-026"
    event_id: "20260721_210722_retract_filelog_timezone_reflect_parallel"
    created_at: "2026-07-21T21:07:22"
    requirement: "テスト実行者・テスト結果確認者が、時刻の扱い（業務日付の進行判定・レポート等の時刻表記）としてプロセスのローカルタイムゾーンを正とする一貫した動作を得られる"
    reason: "stfw.timezone を業務日付判定・レポート時刻表記に使うという要求（旧 Bash 版からの as-is 引き継ぎ）は、プロダクトオーナーの決定により撤回された（実装しない）。時刻はプロセスのローカルタイムゾーンを正とする現実装を正式な仕様とし、実装が参照しない設定キーへの誤った期待を防ぐ"
    priority: "should"
    specifications:
      - id: "SPEC-026-01"
        specification: "時刻（実行ジャーナルのイベント時刻・レポートの時刻表記等）はプロセスのローカルタイムゾーンを正とする。stfw.yml の timezone キーは env 公開のみの任意キーとして残り、実装は業務日付判定・レポート時刻表記に参照しない"
        acceptance_criteria:
          - "Given stfw.yml に timezone を設定 When stfw run を実行する Then timezone は環境変数（stfw_timezone）として公開されるのみで、時刻表記はプロセスのローカルタイムゾーンに従う"
          - "Given プロセスのローカルタイムゾーンを変更した環境 When 実行結果（ジャーナル・レポート）の時刻表記を確認する Then プロセスのローカルタイムゾーンで表記される"
        affected_models:
          - type: "information"
            action: "modify"
            target: "プロジェクト設定（stfw.yml）"
          - type: "buc"
            action: "modify"
            target: "プロジェクト初期化フロー"

  - id: "REQ-027"
    event_id: "20260721_210722_retract_filelog_timezone_reflect_parallel"
    created_at: "2026-07-21T21:07:22"
    requirement: "シナリオ作成者・テスト実行者が、組込み parallel プロセスタイプにより、プロセスディレクトリ配下に定義した子プロセスの並走を選択でき、順序依存の無い処理の実行時間を短縮できる（実行モデルは逐次実行のまま、並走は parallel 配下の子プロセスに限定する）"
    reason: "業務日付内には順序依存の無い処理（複数ホストからの収集・複数データストアの準備等）があり、全てを逐次実行すると実行時間が線形に伸びる。逐次実行・エラー時停止という実行モデルと互換境界（ディレクトリ規約・プラグイン実行契約・エビデンス規約・ジャーナル）を維持したまま、順序依存の無い箇所だけ利用者が並走を選択できるようにするため（v1.5.0 で実装・リリース済みの反映。実装の正本は docs/AS-BUILT.md §4.14）。単一実行（1 run = 1 プロセス）内の子プロセス並走であり、複数ユーザーの同時アクセスやスループットのスケールアウトは引き続きスコープ外とする（NFR グレードの引き上げは意図しない）"
    priority: "should"
    specifications:
      - id: "SPEC-027-01"
        specification: "組込み parallel プロセスタイプを提供する。parallel プロセスはディレクトリ配下に子プロセスディレクトリ（親と同形式 _{seq}_{group}_{type}）を持ち、それらを並走させる。子のタイプに parallel は指定できず（入れ子禁止）、子 0 件は定義不正として validate エラーとする。子にも通常プロセスと同じ検証（ディレクトリ名形式・プラグイン解決可否・config/config.yml 存在・接続情報直書き禁止・plugin.yml requires）を適用する。互換境界（ディレクトリ規約・プロセスプラグイン実行契約・エビデンスディレクトリ規約・ジャーナル）は不変とする"
        acceptance_criteria:
          - "Given _{seq}_{group}_parallel 配下に親と同形式の子プロセスディレクトリを配置 When stfw validate を実行する Then 子にも通常プロセスと同じ検証が適用され合格する"
          - "Given 子のタイプに parallel を指定、または子 0 件の parallel プロセス When stfw validate を実行する Then エラーとして検出される"
        affected_models:
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
          - type: "information"
            action: "modify"
            target: "プロセス"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "condition"
            action: "modify"
            target: "run 前静的検証"
      - id: "SPEC-027-02"
        specification: "parallel の実行セマンティクスを定める。子プロセス 1 件 = 実行ジャーナル上の 1 ステップとし、steps_enumerated イベントで子ディレクトリ名を昇順に全件 Pending 登録する。process 階層フック（setup / teardown）は親 parallel プロセスで 1 回のみ実行し、子では実行しない。子は seq 昇順に実行キューへ投入されて並走する（完了順は不定）。子同士に Blocked は無く、先行子が Error でも全子を最後まで実行する。親 parallel プロセスのステータスは全子の悪い方（Error > Warn > Success）で集約し、親が Error の場合は既存規則どおり後続の兄弟プロセスを実行せず停止する"
        acceptance_criteria:
          - "Given 複数の子プロセスを持つ parallel プロセス When stfw run を実行する Then 各子が 1 ステップとしてジャーナルに記録され（steps_enumerated は子ディレクトリ名の昇順）、process 階層フックは親で 1 回のみ実行される"
          - "Given 一部の子が Error 終了する parallel プロセス When 実行が完了する Then 他の子は Blocked にならず最後まで実行され、親のステータスは全子の悪い方（Error > Warn > Success）で集約される"
          - "Given 親 parallel プロセスが Error に集約された run When 後続の兄弟プロセスを確認する Then 実行されず停止している（既存規則どおり）"
        affected_models:
          - type: "condition"
            action: "add"
            target: "parallel 子プロセスの並走実行"
          - type: "condition"
            action: "modify"
            target: "逐次実行・エラー時 Blocked"
          - type: "state"
            action: "modify"
            target: "ステップ実行ステータス"
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-027-03"
        specification: "同時実行数の上限 max_parallel を設定チェーン（同梱デフォルト stfw.yml（stfw.process.parallel.max_parallel: 0）→ プロジェクト stfw.yml → プロジェクト config/plugins/process/parallel/config.yml → プロセス config/config.yml、後勝ち）で解決する。0 = 上限なし（全子を同時起動）、正整数 = 同時実行数の上限（超過分は seq 順に待機）、負数・非整数は設定不正として親プロセスを Error にする"
        acceptance_criteria:
          - "Given max_parallel を正整数に設定 When parallel プロセスを実行する Then 同時に実行される子の数が上限以下に制限され、超過分は seq 順に待機する"
          - "Given max_parallel 未設定（既定 0） When parallel プロセスを実行する Then 全子が上限なしに並走する"
          - "Given max_parallel に負数・非整数を設定 When parallel プロセスを実行する Then 設定不正として親プロセスが Error になる"
        affected_models:
          - type: "variation"
            action: "add"
            target: "parallel 同時実行数設定"
          - type: "information"
            action: "modify"
            target: "プロジェクト設定（stfw.yml）"
          - type: "information"
            action: "modify"
            target: "Process / Plugin 設定（config.yml）"
      - id: "SPEC-027-04"
        specification: "子の env は親 parallel プロセスの env を複製し、stfw_process_dir / stfw_process_dirname / stfw_process_seq / stfw_process_group / stfw_process_type 等を子の値で上書きする。stfw_process_dir が子ディレクトリを指すため、エビデンスディレクトリ規約は無変更で子ごとに分離される。部分実行（--from / --only）で指定できるのは親 parallel プロセスまでとする（子は指定不可）。spec 往復（stfw scenario reverse / stfw scaffold）は parallel の子プロセス（processes: 入れ子）を扱い可逆とする"
        acceptance_criteria:
          - "Given 子プロセスで収集系プラグインを実行 When エビデンス出力先を確認する Then 各子のプロセスディレクトリ配下の evidence/ に分離して出力される（エビデンスディレクトリ規約は無変更）"
          - "Given parallel の子ノードパスを --from / --only に指定 When stfw run を実行する Then エラーとなり、指定できるのは親 parallel プロセスまでである"
          - "Given parallel を含むシナリオツリー When reverse → scaffold → reverse を実行する Then 子プロセスを含む骨格が完全一致する（可逆）"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "エビデンスディレクトリ規約"
          - type: "condition"
            action: "modify"
            target: "部分実行の指定制約"
          - type: "condition"
            action: "modify"
            target: "spec/doc 往復の可逆性"
          - type: "information"
            action: "modify"
            target: "プラグイン"
