  - id: "REQ-016"
    requirement: "シナリオ作成者・環境管理者が、組み込みプラグイン群を既存の接続情報管理（inventory / secret / ssh trust）と統一された互換境界（ディレクトリ規約・プラグイン env 契約・エビデンスディレクトリ規約）のもとで安全に利用でき、プラグインのランタイム依存を実行前に検出できる"
    reason: "プラグインごとに接続情報の持ち方・出力構造・依存の準備方法がばらつくと、設定の重複・平文資格情報の混入・実行時になって判明する依存不足を招く。横断規約として統一することで、組み込みプラグインとカスタムプラグインの 2 層構造によるエコシステム全体の互換性と安全性を担保するため"
    priority: "must"
    specifications:
      - id: "SPEC-016-01"
        specification: "収集先・接続先ホストは既存の inventory（ホストグループ）を参照し、資格情報は secret（age 暗号化）、SSH ホストキーは ssh trust を利用する。プラグイン設定には接続情報を直接書かず、グループ名参照のみとする"
        acceptance_criteria:
          - "Given 組み込みプラグインの設定（config.yml） When 収集先・接続先を指定する Then inventory のホストグループ名参照のみで指定でき、ホスト名・資格情報は直接記述しない"
          - "Given 収集先・接続先ホストへの接続 When プラグインが資格情報・SSH ホストキーを利用する Then secret（age 暗号化）と ssh trust（known_hosts）の既存機構が利用される"
