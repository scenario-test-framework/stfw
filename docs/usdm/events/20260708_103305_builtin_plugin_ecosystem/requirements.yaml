            target: "パスワード"
          - type: "information"
            action: "modify"
            target: "SSH サーバキー（known_hosts）"
          - type: "information"
            action: "modify"
            target: "Process / Plugin 設定（config.yml）"
          - type: "buc"
            action: "modify"
            target: "接続情報管理フロー"
      - id: "SPEC-016-02"
        specification: "エビデンスディレクトリ規約を新設する。収集系プラグインの出力構造 = compare の expect 構造となるディレクトリ命名規約を定め、ディレクトリ規約・プラグイン env 契約に次ぐ第 3 の互換境界として扱う（具体的な命名は設計フェーズで確定）"
        acceptance_criteria:
          - "Given 収集系プラグイン（collectFile / exportXxx）の出力 When compare の expect ディレクトリを作成する Then 規約に従った同型のディレクトリ構造として対応づけられる"
          - "Given エビデンスディレクトリ規約 When 互換境界の位置づけを確認する Then ディレクトリ規約・プラグイン env 契約に次ぐ第 3 の互換境界として文書化されている"
        affected_models:
          - type: "condition"
