version: "1.0"
event_id: "20260708_103305_builtin_plugin_ecosystem"
created_at: "2026-07-08T10:35:12"
source: "組み込みプロセスプラグイン群の追加構想（回帰テストのデータ準備・実行・エビデンス収集・期待値比較の全自動化。要求定義のみで実装は含まない）: source.txt"
system_name: "stfw"

requirements:
  - id: "REQ-008"
    requirement: "シナリオ作成者が、プロセスタイプをプラグインとして追加・拡張できる（組み込みプラグイン群とカスタムプラグインの 2 層構造）"
    reason: "stfw は回帰テストシナリオの全自動実行ツールであり、grafana k6 等の「準備された環境とリクエスト/レスポンス」を前提にした仕組みと異なり、実行前後の作業（データ準備・後片付け・エビデンス収集・期待値比較）や画面のないバッチ処理の起動までをサポート範囲とする。1 つの業務日付（bizdate）は Arrange（準備）→ Act（実行）→ Collect（収集）→ Assert（検証）のパイプラインであり、組み込みプラグインが各フェーズの汎用部品を提供し、プロダクト固有の知識（業務日付の更新方法・ジョブスケジューラの呼び出し方・共通マスターデータ）は利用者がカスタムプラグインとして組み込みプラグインを組み合わせて実装する 2 層構造とする。プラグイン機構はこの 2 層構造を成立させる基盤の拡張機構であるため"
    priority: "could"
    specifications:
      - id: "SPEC-008-01"
        specification: "プラグイン操作を stfw plugin list / stfw plugin install に再編する（旧 process -l / -I。解決順互換）。scaffold 生成は stfw new process で行う。同名プラグインはプロジェクト（{proj}/plugins/）→ 組込みの順に解決されプロジェクト側が優先される（従来仕様を維持。組込みの配置は STFW_HOME 廃止に伴い配布物側に変更）。プラグイン env 契約（stfw_* / STFW_PROJ_DIR 系）は維持する"
        acceptance_criteria:
          - "Given 標準構成 When stfw plugin list を実行する Then 組込みプラグイン（scripts および組み込みプラグイン群）が一覧表示される"
          - "Given プロジェクトに同名プラグインを配置 When プロセスタイプを解決する Then 従来と互換の解決順でプロジェクト側プラグインが優先される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "プロセスプラグイン拡張フロー"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "condition"
            action: "modify"
            target: "プラグイン解決順"
          - type: "variation"
            action: "modify"
            target: "プラグインスコープ"
          - type: "variation"
            action: "add"
            target: "プラグインフェーズ"

  - id: "REQ-012"
    requirement: "シナリオ作成者が、組み込みプラグイン collectLog / collectFile により、テスト対象ホストから実行ログ・ファイル（外部 IF ファイル等）をエビデンスとしてローカルへ自動収集できる（Collect フェーズ）"
    reason: "回帰テストの全自動化にはエビデンス収集の自動化が不可欠であり、業務日付をまたぐ長時間シナリオでは手作業収集は非現実的である。期待値比較（compare）の入力となる収集結果を、規約化されたディレクトリ構造で機械的に集める汎用部品が必要なため"
    priority: "must"
    specifications:
      - id: "SPEC-012-01"
        specification: "collectLog はテスト対象ホストからの実行ログ収集を行う。scenario-test-framework/logfilter（別リポジトリの OSS バイナリ）を利用し、設定は収集先ホストグループ（inventory 参照）ごとの収集ファイルパス正規表現リストとする。処理は、scp で logfilter バイナリを収集先ホストへ転送 → ssh で実行し「bizdate の実行開始日時」以降のログ行にフィルタ → scp でローカルへ収集 → 転送したバイナリを削除、の順とする。フィルタ基準時刻は実行ジャーナルの bizdate node_start イベント時刻を使用し、プラグイン env 契約（stfw_bizdate_start_ts 等）として公開する。収集先ホストとの時刻同期を前提とし、この制約はドキュメントに明記する"
        acceptance_criteria:
          - "Given inventory のホストグループと収集ファイルパス正規表現リストを設定済み When collectLog プロセスを実行する Then logfilter が scp で転送・ssh で実行され、bizdate の実行開始日時以降のログ行のみが scp でローカルのエビデンスディレクトリへ収集され、転送したバイナリは削除される"
          - "Given bizdate の実行中 When collectLog がフィルタ基準時刻を参照する Then 実行ジャーナルの bizdate node_start イベント時刻が stfw_bizdate_start_ts 等の環境変数（プラグイン env 契約）として公開されている"
          - "Given collectLog の利用ドキュメント When 前提制約を確認する Then 収集先ホストとの時刻同期が制約として明記されている"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
          - type: "information"
            action: "add"
            target: "エビデンス"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "information"
            action: "modify"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "external_system"
            action: "add"
            target: "logfilter（ログ収集 OSS）"
          - type: "external_system"
            action: "modify"
            target: "テスト対象ホスト群"
          - type: "condition"
            action: "add"
            target: "収集先ホストとの時刻同期前提"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
      - id: "SPEC-012-02"
        specification: "collectFile はテスト対象ホストからのファイル収集（外部 IF ファイル等）を行う。設定は収集先ホストグループ（inventory 参照）ごとの収集ファイルパス正規表現リストとし、scp で収集先ホストのファイルをローカルのエビデンスディレクトリへ収集する"
        acceptance_criteria:
          - "Given inventory のホストグループと収集ファイルパス正規表現リストを設定済み When collectFile プロセスを実行する Then 対象ホストのファイルが scp でローカルのエビデンスディレクトリへ収集される"
        affected_models:
          - type: "information"
            action: "add"
            target: "エビデンス"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "external_system"
            action: "modify"
            target: "テスト対象ホスト群"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"

  - id: "REQ-013"
    requirement: "シナリオ作成者が、組み込みプラグイン export / import / clear（MySQL・PostgreSQL・Redis）により、テスト対象データストアのデータ準備（Arrange）とデータのエビデンス収集・期待値作成（Collect）を自動化できる"
    reason: "回帰テストではテスト前のデータ準備・後片付けと実行後のデータ確認が、実行そのものと同等以上の工数を要する。export / import / clear を汎用部品として提供することで、データ準備・後片付け・エビデンス収集・期待値作成を人手を介さず業務日付ごとに反復できるため"
    priority: "must"
    specifications:
      - id: "SPEC-013-01"
        specification: "RDBMS 系プラグインとして exportMysql / importMysql / clearMysql、exportPostgres / importPostgres / clearPostgres を提供する。export はテーブル名リストを指定してヘッダー付き CSV でエクスポートする（エビデンス収集と期待値作成に使用）。import は export が出力した形式（ヘッダー付き CSV）をインポートする（export/import はラウンドトリップ可能）。clear はテーブル名リストを指定して truncate する"
        acceptance_criteria:
          - "Given テーブル名リストを設定済み When exportMysql / exportPostgres プロセスを実行する Then 指定テーブルがヘッダー付き CSV としてエビデンスディレクトリへエクスポートされる"
          - "Given export が出力したヘッダー付き CSV When importMysql / importPostgres プロセスを実行する Then 同一データがインポートされる（export/import はラウンドトリップ可能）"
          - "Given テーブル名リストを設定済み When clearMysql / clearPostgres プロセスを実行する Then 指定テーブルが truncate される"
        affected_models:
          - type: "information"
            action: "add"
            target: "エビデンス"
          - type: "information"
            action: "add"
            target: "期待値（expect）"
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "external_system"
            action: "add"
            target: "テスト対象データストア（MySQL / PostgreSQL / Redis）"
          - type: "condition"
            action: "add"
            target: "export/import ラウンドトリップ互換"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-013-02"
        specification: "KVS 系プラグインとして Redis に対し RDBMS 系と同じバリエーション（export / import / clear）を提供する"
        acceptance_criteria:
          - "Given Redis の接続対象を設定済み When KVS 系の export / import / clear プロセスを実行する Then RDBMS 系と同じバリエーションでエクスポート・インポート・クリアができる"
        affected_models:
          - type: "information"
            action: "modify"
            target: "プラグイン"
          - type: "external_system"
            action: "add"
            target: "テスト対象データストア（MySQL / PostgreSQL / Redis）"
          - type: "condition"
            action: "add"
            target: "export/import ラウンドトリップ互換"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
      - id: "SPEC-013-03"
        specification: "対象製品は代表的な OSS のみとし、public cloud のマネージド製品はまだ対象にしない。RDBMS は MySQL（MariaDB は MySQL 互換として同一プラグインでサポート）と PostgreSQL、KVS は Redis（Valkey は Redis 互換として同一プラグインでサポート）とする。将来の製品追加はプラグイン追加で対応する"
        acceptance_criteria:
          - "Given MariaDB / Valkey のテスト対象 When MySQL 用 / Redis 用プラグインを利用する Then 互換製品として同一プラグインでサポートされる"
          - "Given データストア系プラグインのサポート範囲 When 対象製品を確認する Then 代表的な OSS（MySQL・PostgreSQL・Redis）のみで、public cloud のマネージド製品は含まれない"
        affected_models:
          - type: "variation"
            action: "add"
            target: "対応データストア製品"
          - type: "external_system"
            action: "add"
            target: "テスト対象データストア（MySQL / PostgreSQL / Redis）"

  - id: "REQ-014"
    requirement: "シナリオ作成者が、組み込みプラグイン compare により、収集したエビデンスと期待値（expect）の比較検証（Assert）を自動実行でき、比較不一致はステップ失敗として扱われる"
    reason: "期待値比較の自動化は回帰テスト全自動化の最終段であり、人手の目視比較では網羅性・再現性を担保できない。比較不一致を既存のエラー時停止・Blocked 伝播の仕組みに載せることで、失敗の検知と調査を既存の結果確認手段（status / report / OTel トレース）に一元化できるため"
    priority: "must"
    specifications:
      - id: "SPEC-014-01"
        specification: "compare は scenario-test-framework/compare-files（別リポジトリの OSS）を利用する。compare-files の起動設定・比較レイアウトは stfw プロジェクトごとに持たせる。expect ディレクトリは収集系プラグイン（collectFile / exportXxx）の出力ディレクトリ構造と同型にする（エビデンスディレクトリ規約）。処理は、actual ディレクトリを組み立て（収集系 process ディレクトリへの symlink または一時コピー）→ compare-files を実行 → 比較結果を出力、の順とする。actual / result ディレクトリは gitignore 対象とする"
        acceptance_criteria:
          - "Given expect ディレクトリを収集系プラグインの出力と同型に配置済み When compare プロセスを実行する Then actual ディレクトリが組み立てられ（symlink または一時コピー）、compare-files が実行され、比較結果が出力される"
          - "Given compare の実行後 When プロジェクトの git 管理状態を確認する Then actual / result ディレクトリは gitignore 対象である"
          - "Given compare-files の起動設定・比較レイアウト When 配置場所を確認する Then stfw プロジェクトごとに保持されている"
        affected_models:
          - type: "information"
            action: "add"
            target: "期待値（expect）"
          - type: "information"
            action: "add"
            target: "比較結果"
          - type: "information"
            action: "modify"
            target: "エビデンス"
          - type: "external_system"
            action: "add"
            target: "compare-files（ファイル比較 OSS）"
          - type: "condition"
            action: "add"
            target: "エビデンスディレクトリ規約"
          - type: "variation"
            action: "modify"
            target: "プロセスタイプ"
          - type: "buc"
            action: "modify"
            target: "シナリオ一括自動実行フロー"
      - id: "SPEC-014-02"
        specification: "比較不一致はステップ失敗とし、既存のエラー時停止・Blocked 伝播の対象とする"
        acceptance_criteria:
          - "Given expect と actual に差分がある When compare プロセスを実行する Then 該当ステップは Error となり、後続ステップは Blocked として記録され実行が停止する"
          - "Given expect と actual が一致する When compare プロセスを実行する Then ステップは Success となり後続処理が継続する"
        affected_models:
          - type: "condition"
            action: "add"
            target: "比較不一致はステップ失敗"
          - type: "condition"
            action: "modify"
            target: "逐次実行・エラー時 Blocked"
          - type: "state"
            action: "modify"
            target: "ステップ実行ステータス"

