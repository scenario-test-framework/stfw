        specification: "プラグインごとに前提コマンド（k6・mysql/psql クライアント・ssh/scp 等）をランタイム依存として宣言し、stfw validate が存在チェックで検出する。Docker イメージは既存の最小構成に加えて依存全部入りのタグ（例: stfw:full）を提供する"
