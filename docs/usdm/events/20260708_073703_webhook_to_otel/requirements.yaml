version: "1.0"
event_id: "20260708_073703_webhook_to_otel"
created_at: "2026-07-08T07:39:42"
source: "docs/usdm/events/20260708_073703_webhook_to_otel/source.txt（変更要望: 実行結果通知を webhook から OpenTelemetry に置き換え）"
system_name: "stfw"

requirements:
  - id: "REQ-005"
    status: "deleted"
    superseded_by: "REQ-009"
    requirement: "テスト結果確認者が、run / scenario / bizdate / process 各階層の実行開始・終了（成功 / 失敗）を webhook 通知として外部システムで受け取れる"
    reason: "廃止: 受信側の実装・保守が必要で、可視化・分析には別途仕組みが要るため。OTel トレースによる実行結果通知（REQ-009）に置換し、webhook 通知機能は完全に廃止する（併存させない）"
    priority: "should"
    specifications:
      - id: "SPEC-005-01"
        specification: "廃止: 各階層の start / end 時の payload JSON 変換と設定済み URL 群への非同期 HTTP POST。payload JSON スキーマの互換維持要求も廃止する（REQ-009 の OTLP トレースエクスポートに置換）"
        acceptance_criteria:
          - "Given webhook 機能の廃止後 When 任意の階層が開始・終了する Then HTTP POST による webhook 通知は送信されない"
        affected_models:
          - type: "information"
            action: "delete"
            target: "webhook payload"
          - type: "external_system"
            action: "delete"
            target: "webhook 受信先"
          - type: "variation"
            action: "delete"
            target: "階層タイプ（webhook type）"
          - type: "variation"
            action: "delete"
            target: "webhook イベント種別"
          - type: "condition"
            action: "delete"
            target: "webhook status 決定"
      - id: "SPEC-005-02"
        specification: "廃止: on_start / on_success / on_error 設定によるイベント種別ごとの通知抑制（stfw.yml の stfw.webhooks.* 設定ごと廃止。OTel 側に同等の抑制設定は設けない）"
        acceptance_criteria:
          - "Given webhook 機能の廃止後 When stfw.yml に stfw.webhooks.* を記述する Then 設定は参照されず通知の挙動に影響しない"
        affected_models:
          - type: "variation"
            action: "delete"
            target: "webhook 通知設定"
          - type: "condition"
            action: "delete"
            target: "webhook 送信判定"

  - id: "REQ-009"
    requirement: "テスト結果確認者が、run / scenario / bizdate / process / step の実行状況を OTLP トレース（スパンツリー）として既存のオブザーバビリティ基盤（Jaeger / Grafana Tempo / Datadog 等）で受け取り、そのまま可視化・分析できる"
    reason: "現行 webhook 通知は受信側の実装・保守が必要で、可視化・分析には別途仕組みが要る。OpenTelemetry の標準プロトコル（OTLP）でトレースを送信すれば、既存のオブザーバビリティ基盤でそのまま可視化・分析できるため"
    priority: "must"
    specifications:
      - id: "SPEC-009-01"
        specification: "階層実行をスパンツリーにマップして OTLP トレースエクスポートを実装する。run = ルートスパン、scenario / bizdate / process = 子スパン、step = 末端スパンとする。シグナルはトレースのみとし、ログ・メトリクスは送らない。スパンの開始・終了時刻は実行ジャーナル（journal.jsonl）のイベント時刻と一致させ、実行ジャーナルが唯一のソースであるという現行設計を維持して OTel エクスポートはジャーナルイベントの投影として実装する"
        acceptance_criteria:
          - "Given OTLP エクスポート先設定済み When シナリオを一括自動実行する Then run をルートとし scenario / bizdate / process / step を子孫とするスパンツリーが OTLP 受信先に記録される"
          - "Given OTLP エクスポート先設定済み When 実行が完了する Then 各スパンの開始・終了時刻が実行ジャーナル（journal.jsonl）のイベント時刻と一致する"
          - "Given OTLP エクスポート先設定済み When 実行が完了する Then トレース以外のシグナル（ログ・メトリクス）は送信されない"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "実行結果監視・確認フロー"
          - type: "actor"
            action: "modify"
            target: "テスト結果確認者"
          - type: "information"
            action: "add"
            target: "OTel トレース（スパンツリー）"
          - type: "information"
            action: "add"
            target: "実行ジャーナル（journal.jsonl）"
          - type: "external_system"
            action: "add"
            target: "OTLP 受信先（OpenTelemetry Collector / 互換バックエンド）"
          - type: "variation"
            action: "add"
            target: "スパン階層タイプ"
      - id: "SPEC-009-02"
        specification: "スパン属性に実行コンテキスト（run_id、階層タイプ、bizdate、seq、group、プロセスタイプ、終了コード等。旧 webhook payload が持っていた情報を引き継ぐ）を載せる。実行ステータス Error はスパンステータス Error にマップし、Blocked ステップはスパン属性で表現する"
        acceptance_criteria:
          - "Given OTLP エクスポート先設定済み When プロセスを実行する Then 各スパンの属性に run_id・階層タイプ・bizdate・seq・group・プロセスタイプ・終了コード等の実行コンテキストが記録される"
          - "Given OTLP エクスポート先設定済み When タスクがエラー終了する Then 該当スパンのスパンステータスが Error になる"
          - "Given OTLP エクスポート先設定済み When 先行スクリプトのエラーで後続ステップが Blocked になる Then 該当 step スパンの属性で Blocked が表現される"
        affected_models:
          - type: "condition"
            action: "add"
            target: "スパンステータス・属性マップ"
          - type: "state"
            action: "modify"
            target: "階層実行ステータス"
          - type: "state"
            action: "modify"
            target: "ステップ実行ステータス"
          - type: "information"
            action: "modify"
            target: "ステップ実行結果"
      - id: "SPEC-009-03"
        specification: "エクスポート先は OTel 標準の環境変数（OTEL_EXPORTER_OTLP_ENDPOINT 等）を尊重し、stfw.yml でも設定できる（stfw.otel.endpoint 等）。送信先が未設定の場合は送信しない（現行 webhook の「URL 未設定なら送信しない」と同じ方針）"
        acceptance_criteria:
          - "Given 環境変数 OTEL_EXPORTER_OTLP_ENDPOINT を設定 When シナリオを実行する Then その endpoint へトレースが送信される"
          - "Given stfw.yml の stfw.otel.endpoint を設定 When シナリオを実行する Then その endpoint へトレースが送信される"
          - "Given 環境変数・stfw.yml のいずれにも送信先が未設定 When シナリオを実行する Then トレースは送信されない"
        affected_models:
          - type: "information"
            action: "modify"
            target: "プロジェクト設定（stfw.yml）"
          - type: "variation"
            action: "add"
            target: "OTel エクスポート設定"
          - type: "condition"
            action: "add"
            target: "OTel エクスポート先未設定時の送信抑制"
      - id: "SPEC-009-04"
        specification: "トレースの送信失敗は実行を失敗させず、ログ警告のみとする（現行 webhook と同じ方針）"
        acceptance_criteria:
          - "Given OTLP エクスポート先が到達不能 When シナリオを実行する Then 実行は失敗せず完走し、実行ログに警告が記録される"
        affected_models:
          - type: "condition"
            action: "add"
            target: "OTel エクスポート失敗の非致命扱い"
          - type: "information"
            action: "modify"
            target: "実行ログ"

  - id: "REQ-010"
    requirement: "webhook 通知機能を完全に廃止する（OTel トレースエクスポートと併存させない）"
    reason: "通知手段を OTLP トレースに一本化するため。webhook を併存させると受信側の実装・保守と payload JSON スキーマの互換維持が残り続け、置換の目的（保守負担の解消と既存オブザーバビリティ基盤の活用）を達成できないため"
    priority: "must"
    specifications:
      - id: "SPEC-010-01"
        specification: "webhook 送信機能を撤去し、stfw.yml の stfw.webhooks.* 設定（urls / on_start / on_success / on_error）を廃止する。webhook payload JSON スキーマの互換維持要求も廃止する"
        acceptance_criteria:
          - "Given 廃止後の stfw When 任意の階層・ステップが開始・終了する Then webhook（HTTP POST）は一切送信されない"
          - "Given 廃止後の stfw のテンプレート When stfw init でプロジェクトを初期化する Then 生成される stfw.yml に stfw.webhooks.* 設定は含まれない"
        affected_models:
          - type: "information"
            action: "modify"
            target: "プロジェクト設定（stfw.yml）"
          - type: "information"
            action: "delete"
            target: "webhook payload"
          - type: "external_system"
            action: "delete"
            target: "webhook 受信先"
          - type: "condition"
            action: "delete"
            target: "webhook 送信判定"
          - type: "condition"
            action: "delete"
            target: "webhook status 決定"
          - type: "variation"
            action: "delete"
            target: "webhook 通知設定"
          - type: "variation"
            action: "delete"
            target: "webhook イベント種別"
          - type: "variation"
            action: "delete"
            target: "階層タイプ（webhook type）"
