# exportPostgres の接続系をプロジェクト全体で共通化する上書き設定 (§8.1 の上書きチェーン)。
# 各シナリオのプロセス config/config.yml は tables だけを書けばよい。
# database / user は stfw.yml (stfw.db.*) を単一ソースとし、${stfw_db_database} / ${stfw_db_user}
# で参照する (run 開始時に stfw.yml が環境へ export される。AS-BUILT §8.2)。
stfw:
  process:
    exportPostgres:
      host_group: db
      port: "5432"
      database: ${stfw_db_database}
      user: ${stfw_db_user}
