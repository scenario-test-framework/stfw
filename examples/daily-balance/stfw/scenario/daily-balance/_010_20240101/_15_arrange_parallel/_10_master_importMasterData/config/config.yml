# Arrange: シナリオ共通のマスタデータ (口座名義 users) を投入する。
# importMasterData はカスタムプラグイン (plugins/process/importMasterData)。
# 共通データ config/plugins/process/importMasterData/data/appdb/users.csv を読み、
# data/appdb/users.csv へ配置して組込み importPostgres へ委譲する。
# 接続系は config/plugins/process/importMasterData/config.yml で共通化 (ここは tables のみ)。
stfw:
  process:
    importMasterData:
      tables:
        - users
