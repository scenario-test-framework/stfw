# Arrange: シナリオ共通のマスタデータ (口座名義 users) を投入する。
# importMasterData はカスタムプラグイン (plugins/process/importMasterData)。
# 共通データ config/plugins/importMasterData/data/appdb/users.csv を読み、
# data/appdb/users.csv へ配置して組込み importPostgres へ委譲する。
stfw:
  process:
    importMasterData:
      host_group: db
      port: "5432"
      database: appdb
      user: appuser
      tables:
        - users
