# daily-balance example の実行環境。
#   ./run.sh                       # 依存起動 → secret 準備 → stfw run → レポート配信
# もしくは個別に:
#   docker compose up -d postgres api            # SUT (テスト対象) を起動
#   docker compose run --rm stfw run daily-balance
#   docker compose up -d nginx && open http://localhost:8088   # HTML レポート閲覧
configs:
  nginx_conf:
    content: |
      server {
        listen 80;
        root /reports;
        index index.html;
        autoindex on;
      }

services:
  # --- テスト対象システム (SUT): postgres + トイ REST API ---
  postgres:
    image: postgres:16-alpine
    environment:
      # DB 接続先の identity は STFW_DB_* を単一ソースにする (既定は appuser/appdb/apppass)。
      # 変更する場合は STFW_DB_USER=foo ./run.sh のように 1 か所だけ上書きすればよい。
      POSTGRES_USER: ${STFW_DB_USER:-appuser}
      POSTGRES_PASSWORD: ${STFW_DB_PASSWORD:-apppass}
      POSTGRES_DB: ${STFW_DB_DATABASE:-appdb}
    volumes:
      - ./sut/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STFW_DB_USER:-appuser} -d ${STFW_DB_DATABASE:-appdb}"]
      interval: 2s
      timeout: 3s
      retries: 15

  api:
    build:
      context: ./sut
    environment:
      DATABASE_URL: postgres://${STFW_DB_USER:-appuser}:${STFW_DB_PASSWORD:-apppass}@postgres:5432/${STFW_DB_DATABASE:-appdb}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/sut", "-healthcheck"]
      interval: 2s
      timeout: 3s
      retries: 15

  # --- stfw 本体 (全ランタイム同梱の :full。psql / k6 を内蔵) ---
  stfw:
    image: ghcr.io/scenario-test-framework/stfw:full
    build:
      context: ../..
      target: full
    working_dir: /work
    environment:
      # 各プロセス config の ${STFW_DB_*} 展開元 (stfw は os.Getenv を参照する)。
      # postgres/api と同じ STFW_DB_* を単一ソースにするので、接続先を変えても
      # ここ 1 系統の env を変えるだけで全プロセスに反映される。
      STFW_DB_DATABASE: ${STFW_DB_DATABASE:-appdb}
      STFW_DB_USER: ${STFW_DB_USER:-appuser}
    volumes:
      - ./stfw:/work
      - reports:/work/.stfw/reports
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    profiles: ["cli"]

  # --- HTML レポート配信 (nginx) ---
  reports-init:
    image: ghcr.io/scenario-test-framework/stfw:full
    build:
      context: ../..
      target: full
    user: root
    entrypoint: ["chown", "1000:1000", "/reports"]
    volumes:
      - reports:/reports
    restart: "no"

  nginx:
    image: nginx:1-alpine
    depends_on:
      reports-init:
        condition: service_completed_successfully
    # レポート閲覧用。他サービスと衝突する場合は STFW_REPORT_PORT で変更可
    ports:
      - "${STFW_REPORT_PORT:-8088}:80"
    volumes:
      - reports:/reports:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf

volumes:
  reports:
