name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/scenario-test-framework/stfw
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
      # 全組込みプラグインのランタイム同梱版 (stfw:{version}-full / stfw:full)
      - uses: docker/metadata-action@v6
        id: meta-full
        with:
          images: ghcr.io/scenario-test-framework/stfw
          tags: |
            type=semver,pattern={{version}},suffix=-full
            type=raw,value=full
          # flavor.latest は既定 auto で semver から plain `latest` を自動生成するため、
          # full 側が通常版の latest を上書きしないよう明示的に無効化する
          flavor: |
            latest=false
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: full
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-full.outputs.tags }}
          labels: ${{ steps.meta-full.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
